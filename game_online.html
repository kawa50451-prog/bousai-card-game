<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>都市防災カードバトル オンライン版</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg0: #0d1117;
      --bg1: #161b22;
      --bg2: #21262d;
      --bg3: #30363d;
      --t1: #e6edf3;
      --t2: #8b949e;
      --t3: #484f58;
      --blue: #388bfd;
      --red: #f85149;
      --green: #3fb950;
      --yellow: #d29922;
      --purple: #a371f7;
      --card-h: 140px;
      --card-w: 100px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg0);
      color: var(--t1);
      min-height: 100vh;
      overflow-x: hidden
    }

    #app {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .screen {
      display: none;
      flex-direction: column;
      gap: 12px;
      flex: 1
    }

    .screen.active {
      display: flex
    }

    /* LOBBY */
    .lobby-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .lobby-box {
      background: var(--bg1);
      border: 1px solid var(--bg3);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 440px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .5)
    }

    .lobby-hero {
      text-align: center
    }

    .lobby-title {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f0c040, #e06020);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 8px 0 4px
    }

    .lobby-label {
      display: block;
      font-size: .8rem;
      color: var(--t2);
      margin-bottom: 5px;
      font-weight: 600;
      letter-spacing: .04em
    }

    .lobby-input {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid var(--bg3);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--t1);
      font-size: 1rem;
      outline: none;
      transition: .2s
    }

    .lobby-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 139, 253, .2)
    }

    .lobby-input.code-input {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-align: center;
      text-transform: uppercase
    }

    .lobby-mode-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .lobby-btn {
      background: var(--bg2);
      border: 1.5px solid var(--bg3);
      border-radius: 12px;
      padding: 16px 12px;
      color: var(--t1);
      cursor: pointer;
      transition: .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-size: .9rem
    }

    .lobby-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, .4)
    }

    .lobby-btn.host {
      border-color: rgba(56, 139, 253, .5);
      background: rgba(56, 139, 253, .08)
    }

    .lobby-btn.host:hover {
      background: rgba(56, 139, 253, .18);
      border-color: var(--blue)
    }

    .lobby-btn.join {
      border-color: rgba(63, 185, 80, .5);
      background: rgba(63, 185, 80, .08)
    }

    .lobby-btn.join:hover {
      background: rgba(63, 185, 80, .18);
      border-color: var(--green)
    }

    .lobby-btn-single {
      width: 100%;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none;
      border-radius: 12px;
      padding: 13px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: .2s
    }

    .lobby-btn-single:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(56, 139, 253, .4)
    }

    .lobby-btn-back {
      width: 100%;
      background: var(--bg3);
      border: none;
      border-radius: 10px;
      padding: 10px;
      color: var(--t2);
      font-size: .9rem;
      cursor: pointer;
      transition: .2s;
      margin-top: 4px
    }

    .lobby-btn-back:hover {
      background: var(--bg2);
      color: var(--t1)
    }

    .lobby-error {
      background: rgba(248, 81, 73, .1);
      border: 1px solid rgba(248, 81, 73, .4);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .82rem;
      color: var(--red)
    }

    /* WAITING / CONNECTION */
    .wait-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 30px 20px
    }

    .wait-icon {
      font-size: 3.5rem
    }

    .wait-title {
      font-size: 1.3rem;
      font-weight: 700
    }

    .wait-sub {
      color: var(--t2);
      font-size: .88rem
    }

    .room-code-display {
      background: var(--bg2);
      border: 2px solid var(--yellow);
      border-radius: 14px;
      padding: 16px 24px;
      text-align: center
    }

    .room-code-label {
      font-size: .72rem;
      color: var(--t2);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .room-code-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .25em;
      color: var(--yellow)
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-anim 1.2s ease-in-out infinite
    }

    .waiting-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(56, 139, 253, .08);
      border: 1px solid rgba(56, 139, 253, .3);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .83rem;
      color: var(--blue)
    }

    .waiting-banner.red {
      background: rgba(248, 81, 73, .08);
      border-color: rgba(248, 81, 73, .3);
      color: var(--red)
    }

    @keyframes pulse-anim {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(.85)
      }
    }

    /* SETUP REQUIRED */
    .setup-box {
      max-width: 520px;
      margin: auto;
      padding: 24px;
      background: var(--bg1);
      border-radius: 16px;
      border: 1px solid var(--bg3)
    }

    .setup-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
      font-size: .85rem;
      color: var(--t2);
      line-height: 1.6
    }

    .setup-num {
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--yellow);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0
    }

    .setup-box code {
      background: var(--bg3);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: .82rem;
      color: var(--t1)
    }

    /* TITLE / GACHA / DRAFT (from game.html) */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--t2);
      padding: 4px 0
    }

    .gacha-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 0
    }

    .gacha-mystery {
      background: var(--bg2);
      border: 3px dashed var(--bg3);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      width: 240px;
      cursor: pointer;
      transition: .2s
    }

    .gacha-mystery:hover {
      border-color: var(--yellow);
      transform: scale(1.03)
    }

    .gacha-card-box {
      background: linear-gradient(145deg, #1a2540, #0d1a2d);
      border: 3px solid var(--yellow);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      width: 260px;
      box-shadow: 0 0 32px rgba(210, 153, 34, .35)
    }

    .gacha-first-pick {
      background: var(--bg2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .85rem;
      color: var(--t2);
      border-left: 3px solid var(--green)
    }

    @keyframes gacha-reveal {
      0% {
        transform: scale(0.2) rotateY(90deg);
        opacity: 0
      }

      55% {
        transform: scale(1.08) rotateY(-6deg);
        opacity: 1
      }

      100% {
        transform: scale(1) rotateY(0deg);
        opacity: 1
      }
    }

    .gacha-reveal {
      animation: gacha-reveal .5s cubic-bezier(.22, .68, 0, 1.2) forwards
    }

    .btn-gacha {
      padding: 16px 52px;
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b45309, #d29922);
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      transition: .2s;
      letter-spacing: .04em
    }

    .btn-gacha:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(210, 153, 34, .5)
    }

    .btn-accept {
      padding: 13px 44px;
      font-size: 1rem;
      font-weight: 700;
      background: var(--bg2);
      border: 2px solid var(--green);
      border-radius: 10px;
      color: var(--green);
      cursor: pointer;
      transition: .2s
    }

    .btn-accept:hover {
      background: var(--green);
      color: #000
    }

    .draft-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg2);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid var(--bg3)
    }

    .draft-pips {
      display: flex;
      gap: 5px
    }

    .draft-pip {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg3)
    }

    .draft-pip.done {
      background: var(--green)
    }

    .draft-pip.current {
      background: var(--yellow);
      box-shadow: 0 0 6px rgba(210, 153, 34, .6)
    }

    .draft-hand-preview {
      background: var(--bg1);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid var(--bg3)
    }

    .draft-hand-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .75rem;
      border: 1px solid var(--bg3)
    }

    /* MAIN GAME */
    .battle-layout {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1
    }

    .opponent-zone,
    .player-zone {
      background: var(--bg1);
      border-radius: 12px;
      padding: 12px
    }

    .opponent-zone {
      border: 1px solid var(--bg3)
    }

    .player-zone {
      border: 2px solid var(--blue)
    }

    .zone-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap
    }

    .zone-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .city-name-display {
      font-size: 1rem;
      font-weight: 700
    }

    .city-icon-sm {
      font-size: 1.4rem
    }

    .hp-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px
    }

    .hp-bar-wrap {
      flex: 1;
      height: 14px;
      background: var(--bg3);
      border-radius: 7px;
      overflow: hidden
    }

    .hp-bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width .4s
    }

    .hp-text {
      font-size: .85rem;
      font-weight: 700;
      min-width: 56px;
      text-align: right
    }

    .backup-city-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      padding: 3px 0;
      border-top: 1px solid var(--bg3);
      opacity: .75
    }

    .backup-label {
      font-size: .7rem;
      color: var(--t2);
      white-space: nowrap
    }

    .hp-bar-mini {
      flex: 1;
      max-width: 80px;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden
    }

    .hp-bar-mini-fill {
      height: 100%;
      border-radius: 3px
    }

    .backup-hp-text {
      font-size: .7rem;
      min-width: 36px;
      text-align: right
    }

    .effects-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 22px;
      margin-bottom: 4px
    }

    .eff-badge {
      font-size: .68rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600
    }

    .eff-blue {
      background: rgba(56, 139, 253, .2);
      color: var(--blue);
      border: 1px solid rgba(56, 139, 253, .3)
    }

    .eff-red {
      background: rgba(248, 81, 73, .2);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, .3)
    }

    .eff-yellow {
      background: rgba(210, 153, 34, .2);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, .3)
    }

    .eff-gray {
      background: rgba(139, 148, 158, .15);
      color: var(--t2);
      border: 1px solid var(--bg3)
    }

    .hand-cards-area {
      margin-top: 6px
    }

    .hand-back-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .card-back {
      width: var(--card-w);
      height: var(--card-h);
      background: repeating-linear-gradient(45deg, var(--bg2) 0, var(--bg2) 8px, var(--bg3) 8px, var(--bg3) 16px);
      border-radius: 8px;
      border: 1px solid var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--t3)
    }

    .hand-count {
      font-size: .8rem;
      color: var(--t2);
      margin-top: 4px
    }

    .hand-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .hand-groups {
      display: flex;
      gap: 16px;
      flex-wrap: wrap
    }

    .hand-group {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .hand-group-label {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase
    }

    .hand-group-label.policy-label {
      color: var(--blue)
    }

    .hand-group-label.disaster-label {
      color: var(--red)
    }

    .hand-group-cards {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    /* CARD */
    .card {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: .2s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative
    }

    .card:hover:not(.card-disabled) {
      transform: translateY(-8px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .6)
    }

    .card-disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .card.disaster {
      background: linear-gradient(160deg, #2d0d0d, #1a0a0a);
      border-color: #f85149
    }

    .card.policy {
      background: linear-gradient(160deg, #0d1a2d, #0a1020);
      border-color: #388bfd
    }

    .card-header {
      padding: 5px 6px;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .card.disaster .card-header {
      background: rgba(248, 81, 73, .2)
    }

    .card.policy .card-header {
      background: rgba(56, 139, 253, .2)
    }

    .card-icon {
      font-size: 1rem
    }

    .card-cost {
      margin-left: auto;
      font-size: .75rem;
      font-weight: 700;
      background: var(--bg0);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .card.disaster .card-cost {
      color: var(--red)
    }

    .card.policy .card-cost {
      color: var(--blue)
    }

    .card-name {
      padding: 4px 6px;
      font-size: .75rem;
      font-weight: 700;
      line-height: 1.2
    }

    .card-desc {
      padding: 0 6px 6px;
      font-size: .62rem;
      color: var(--t2);
      line-height: 1.35;
      flex: 1
    }

    .card-type-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: .55rem;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 600
    }

    .card.disaster .card-type-badge {
      background: rgba(248, 81, 73, .2);
      color: var(--red)
    }

    .card.policy .card-type-badge {
      background: rgba(56, 139, 253, .2);
      color: var(--blue)
    }

    .card-disabled-reason {
      font-size: .65rem;
      color: var(--t3);
      text-align: center;
      margin-top: 4px
    }

    /* STATUS BAR */
    .status-bar {
      background: var(--bg2);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--bg3)
    }

    .turn-badge {
      font-size: .8rem;
      font-weight: 700;
      color: var(--t2)
    }

    .budget-display {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .budget-label {
      font-size: .75rem;
      color: var(--t2)
    }

    .budget-pips {
      display: flex;
      gap: 3px
    }

    .pip {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--bg3)
    }

    .pip.used {
      background: var(--bg0)
    }

    .pip.avail {
      background: var(--green)
    }

    .status-bar .spacer {
      flex: 1
    }

    .btn-end {
      padding: 7px 20px;
      font-size: .85rem;
      font-weight: 700;
      background: var(--bg3);
      border: none;
      border-radius: 8px;
      color: var(--t1);
      cursor: pointer;
      transition: .2s
    }

    .btn-end:hover {
      background: var(--blue);
      color: #fff
    }

    /* LOG - 折りたたみ式＋色分け強化 */
    .log-area {
      background: var(--bg1);
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid var(--bg3);
    }

    .log-entry {
      font-size: .75rem;
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 3px;
    }

    .log-entry.dmg {
      color: var(--red);
      background: rgba(248, 81, 73, .08);
    }

    .log-entry.heal {
      color: var(--green);
      background: rgba(63, 185, 80, .08);
    }

    .log-entry.policy {
      color: var(--blue);
      background: rgba(56, 139, 253, .08);
    }

    .log-entry.sys {
      color: var(--yellow);
      font-weight: 600;
      background: rgba(227, 179, 65, .06);
    }

    .log-entry:not(.dmg):not(.heal):not(.policy):not(.sys) {
      color: var(--t2);
    }

    .log-collapsed .log-entry:nth-child(n+3) {
      display: none;
    }

    .log-toggle {
      display: block;
      width: 100%;
      background: none;
      border: 1px dashed var(--bg3);
      border-radius: 6px;
      padding: 4px 0;
      color: var(--t3);
      font-size: .72rem;
      cursor: pointer;
      margin-top: 4px;
      text-align: center;
    }

    .log-toggle:hover {
      background: var(--bg2);
      color: var(--t2);
    }

    /* TERRAIN BADGE */
    .terrain-badge {
      font-size: 1rem;
      color: var(--t1);
      font-weight: 700;
      margin-left: 2px;
    }

    /* ACTION BAR (ターン終了ボタン) */
    .action-bar {
      display: flex;
      justify-content: center;
      padding: 6px 0;
    }

    .action-bar .btn-end {
      font-size: .85rem;
      padding: 8px 24px;
    }

    /* AUTO END BAR */
    .auto-end-bar {
      background: rgba(227, 179, 65, .12);
      border: 1px solid var(--yellow);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    .auto-end-text {
      font-size: .85rem;
      color: var(--yellow);
      font-weight: 600;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }

    /* RESPONSE */
    .response-pending-bar {
      background: rgba(248, 81, 73, .1);
      border: 1px solid var(--red);

    }

    // ═══════════════════════════════════════
    // STATE

    const mkEffects = () => ({
      shieldQuakeFire: false, shieldFlood: false, negateSpecial: false,

    let G = {

      ],

      pendingAttack: null, peekCard: null, peekByPlayerIdx: null, winner: null,
      gachaPickedIds: [], gachaCurrent: null, draftState: null,

    // ═══════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.random() * (i + 1) | 0;[arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    function createDeck() { const d = []; for (const c of ALL_CARDS) for (let i = 0; i < 3; i++)d.push({ ...c, uid: c.id + '_' + i }); return shuffle(d); }
    function getActiveCity(pi) { const p = G.players[pi]; return p.cities[p.activeCityIdx]; }
    function getActiveCityHp(pi) { const p = G.players[pi]; return p.cityHps[p.activeCityIdx]; }
    function getActiveMaxHp(pi) { return G.players[pi].cities[G.players[pi].activeCityIdx].hp; }
    function getBudget(pi) { const p = G.players[pi]; const c = getActiveCity(pi); let b = 3; if (c && c.abilityType === 'extra_budget') b += c.abilityValue; if (c && c.abilityType === 'flood_budget' && p.effects.floodBonusTurns > 0) b += 1; return b; }
    function getBudgetLeft(pi) { return getBudget(pi) - G.players[pi].budgetUsed; }
    function addLog(msg, cls = '') {
      let finalCls = cls;
      if (msg.includes('壊滅')) finalCls = (cls ? cls + ' critical' : 'critical');
      if (cls === 'sys' && msg.startsWith('───')) {
        G.log.unshift({ msg: '─ ─ ─', cls: 'divider' });
      }
      G.log.unshift({ msg, cls: finalCls });
      if (G.log.length > 40) G.log.length = 40;
    }
    function hpColor(hp, max) { const r = hp / max; if (r > 0.6) return '#3fb950'; if (r > 0.3) return '#d29922'; return '#f85149'; }

    function drawCards(pi, n) {
      const p = G.players[pi];
      for (let i = 0; i < n; i++) {
        if (G.deck.length === 0) { if (G.discard.length === 0) break; G.deck = shuffle([...G.discard]); G.discard = []; addLog('山札をシャッフルしました', 'sys'); }
        p.hand.push(G.deck.shift());
      }
    }
    function autoDiscard(pi) { const p = G.players[pi]; while (p.hand.length > 5) { const d = p.hand.pop(); G.discard.push(d); addLog(`📤 ${p.name}の手札超過：自動で1枚捨てた`, 'sys'); } }
    function handleDiscardIfNeeded(pi, returnTo) {
      if (G.players[pi].hand.length > 5) { G.discardNeeded = { pi, returnTo }; G.screen = 'discard'; pushState(); render(); return true; }
      return false;
    }
    function computeEstDmg(card, defIdx) {
      const d = getActiveCity(defIdx); let e = card.baseDamage;
      if (card.specialType === 'coastal_bonus' && d && d.isCoastal) e += 10;
      else if (card.specialType === 'mountain_bonus' && d && d.isMountain) e += 10;
      else if (card.specialType === 'inland_bonus' && d && !d.isCoastal && !d.isMountain) e += 10;
      return e;
    }
    function canPlayAny(pi) {
      const p = G.players[pi]; const left = getBudgetLeft(pi); const ft = (pi === 0 && G.turnsEach[0] === 0);
      return p.hand.some(c => { if (left < c.cost) return false; if (ft && c.type === 'disaster') return false; return true; });
    }
    function goMain() {
      G.screen = 'main'; const ap = G.activePlayer; const p = G.players[ap];
      if (!G.pendingAttack && p.hand.length > 0 && !canPlayAny(ap)) { addLog(`${p.name}：使用可能なカードがないためターン自動終了`, 'sys'); endTurn(); return; }
      pushState(); render();
    }

    // ─── online版checkWin: 即時都市切り替え ───
    function checkWin() {
      for (let i = 0; i < 2; i++) {
        const p = G.players[i];
        if (p.cityHps[p.activeCityIdx] <= 0) {
          const nxt = p.activeCityIdx + 1;
          if (nxt < p.cities.length && p.cityHps[nxt] > 0) {
            const old = p.cities[p.activeCityIdx];
            p.cityHps[p.activeCityIdx] = 0; p.activeCityIdx = nxt; p.effects = mkEffects();
            addLog(`💥 ${p.name}の「${old.name}」壊滅！→「${p.cities[nxt].name}」に切り替え！`, 'sys');
            return false;
          } else { G.winner = i === 0 ? 1 : 0; G.screen = 'gameover'; pushState(); render(); return true; }
        }
      }
      return false;
