<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>都市防災カードバトル オンライン版</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg0: #0d1117;
      --bg1: #161b22;
      --bg2: #21262d;
      --bg3: #30363d;
      --t1: #e6edf3;
      --t2: #8b949e;
      --t3: #484f58;
      --blue: #388bfd;
      --red: #f85149;
      --green: #3fb950;
      --yellow: #d29922;
      --purple: #a371f7;
      --card-h: 140px;
      --card-w: 100px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg0);
      color: var(--t1);
      min-height: 100vh;
      overflow-x: hidden
    }

    #app {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .screen {
      display: none;
      flex-direction: column;
      gap: 12px;
      flex: 1
    }

    .screen.active {
      display: flex
    }

    /* LOBBY */
    .lobby-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .lobby-box {
      background: var(--bg1);
      border: 1px solid var(--bg3);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 440px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .5)
    }

    .lobby-hero {
      text-align: center
    }

    .lobby-title {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f0c040, #e06020);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 8px 0 4px
    }

    .lobby-label {
      display: block;
      font-size: .8rem;
      color: var(--t2);
      margin-bottom: 5px;
      font-weight: 600;
      letter-spacing: .04em
    }

    .lobby-input {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid var(--bg3);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--t1);
      font-size: 1rem;
      outline: none;
      transition: .2s
    }

    .lobby-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56, 139, 253, .2)
    }

    .lobby-input.code-input {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-align: center;
      text-transform: uppercase
    }

    .lobby-mode-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .lobby-btn {
      background: var(--bg2);
      border: 1.5px solid var(--bg3);
      border-radius: 12px;
      padding: 16px 12px;
      color: var(--t1);
      cursor: pointer;
      transition: .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-size: .9rem
    }

    .lobby-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, .4)
    }

    .lobby-btn.host {
      border-color: rgba(56, 139, 253, .5);
      background: rgba(56, 139, 253, .08)
    }

    .lobby-btn.host:hover {
      background: rgba(56, 139, 253, .18);
      border-color: var(--blue)
    }

    .lobby-btn.join {
      border-color: rgba(63, 185, 80, .5);
      background: rgba(63, 185, 80, .08)
    }

    .lobby-btn.join:hover {
      background: rgba(63, 185, 80, .18);
      border-color: var(--green)
    }

    .lobby-btn-single {
      width: 100%;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none;
      border-radius: 12px;
      padding: 13px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: .2s
    }

    .lobby-btn-single:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(56, 139, 253, .4)
    }

    .lobby-btn-back {
      width: 100%;
      background: var(--bg3);
      border: none;
      border-radius: 10px;
      padding: 10px;
      color: var(--t2);
      font-size: .9rem;
      cursor: pointer;
      transition: .2s;
      margin-top: 4px
    }

    .lobby-btn-back:hover {
      background: var(--bg2);
      color: var(--t1)
    }

    .lobby-error {
      background: rgba(248, 81, 73, .1);
      border: 1px solid rgba(248, 81, 73, .4);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .82rem;
      color: var(--red)
    }

    /* WAITING / CONNECTION */
    .wait-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 30px 20px
    }

    .wait-icon {
      font-size: 3.5rem
    }

    .wait-title {
      font-size: 1.3rem;
      font-weight: 700
    }

    .wait-sub {
      color: var(--t2);
      font-size: .88rem
    }

    .room-code-display {
      background: var(--bg2);
      border: 2px solid var(--yellow);
      border-radius: 14px;
      padding: 16px 24px;
      text-align: center
    }

    .room-code-label {
      font-size: .72rem;
      color: var(--t2);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .room-code-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .25em;
      color: var(--yellow)
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-anim 1.2s ease-in-out infinite
    }

    .waiting-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(56, 139, 253, .08);
      border: 1px solid rgba(56, 139, 253, .3);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .83rem;
      color: var(--blue)
    }

    .waiting-banner.red {
      background: rgba(248, 81, 73, .08);
      border-color: rgba(248, 81, 73, .3);
      color: var(--red)
    }

    @keyframes pulse-anim {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(.85)
      }
    }

    /* SETUP REQUIRED */
    .setup-box {
      max-width: 520px;
      margin: auto;
      padding: 24px;
      background: var(--bg1);
      border-radius: 16px;
      border: 1px solid var(--bg3)
    }

    .setup-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
      font-size: .85rem;
      color: var(--t2);
      line-height: 1.6
    }

    .setup-num {
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--yellow);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0
    }

    .setup-box code {
      background: var(--bg3);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: .82rem;
      color: var(--t1)
    }

    /* TITLE / GACHA / DRAFT (from game.html) */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--t2);
      padding: 4px 0
    }

    .gacha-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 0
    }

    .gacha-mystery {
      background: var(--bg2);
      border: 3px dashed var(--bg3);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      width: 240px;
      cursor: pointer;
      transition: .2s
    }

    .gacha-mystery:hover {
      border-color: var(--yellow);
      transform: scale(1.03)
    }

    .gacha-card-box {
      background: linear-gradient(145deg, #1a2540, #0d1a2d);
      border: 3px solid var(--yellow);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      width: 260px;
      box-shadow: 0 0 32px rgba(210, 153, 34, .35)
    }

    .gacha-first-pick {
      background: var(--bg2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .85rem;
      color: var(--t2);
      border-left: 3px solid var(--green)
    }

    @keyframes gacha-reveal {
      0% {
        transform: scale(0.2) rotateY(90deg);
        opacity: 0
      }

      55% {
        transform: scale(1.08) rotateY(-6deg);
        opacity: 1
      }

      100% {
        transform: scale(1) rotateY(0deg);
        opacity: 1
      }
    }

    .gacha-reveal {
      animation: gacha-reveal .5s cubic-bezier(.22, .68, 0, 1.2) forwards
    }

    .btn-gacha {
      padding: 16px 52px;
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b45309, #d29922);
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      transition: .2s;
      letter-spacing: .04em
    }

    .btn-gacha:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(210, 153, 34, .5)
    }

    .btn-accept {
      padding: 13px 44px;
      font-size: 1rem;
      font-weight: 700;
      background: var(--bg2);
      border: 2px solid var(--green);
      border-radius: 10px;
      color: var(--green);
      cursor: pointer;
      transition: .2s
    }

    .btn-accept:hover {
      background: var(--green);
      color: #000
    }

    .draft-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg2);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid var(--bg3)
    }

    .draft-pips {
      display: flex;
      gap: 5px
    }

    .draft-pip {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg3)
    }

    .draft-pip.done {
      background: var(--green)
    }

    .draft-pip.current {
      background: var(--yellow);
      box-shadow: 0 0 6px rgba(210, 153, 34, .6)
    }

    .draft-hand-preview {
      background: var(--bg1);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid var(--bg3)
    }

    .draft-hand-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .75rem;
      border: 1px solid var(--bg3)
    }

    /* MAIN GAME */
    .battle-layout {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1
    }

    .opponent-zone,
    .player-zone {
      background: var(--bg1);
      border-radius: 12px;
      padding: 12px
    }

    .opponent-zone {
      border: 1px solid var(--bg3)
    }

    .player-zone {
      border: 2px solid var(--blue)
    }

    .zone-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap
    }

    .zone-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .city-name-display {
      font-size: 1rem;
      font-weight: 700
    }

    .city-icon-sm {
      font-size: 1.4rem
    }

    .hp-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px
    }

    .hp-bar-wrap {
      flex: 1;
      height: 14px;
      background: var(--bg3);
      border-radius: 7px;
      overflow: hidden
    }

    .hp-bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width .4s
    }

    .hp-text {
      font-size: .85rem;
      font-weight: 700;
      min-width: 56px;
      text-align: right
    }

    .backup-city-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      padding: 3px 0;
      border-top: 1px solid var(--bg3);
      opacity: .75
    }

    .backup-label {
      font-size: .7rem;
      color: var(--t2);
      white-space: nowrap
    }

    .hp-bar-mini {
      flex: 1;
      max-width: 80px;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden
    }

    .hp-bar-mini-fill {
      height: 100%;
      border-radius: 3px
    }

    .backup-hp-text {
      font-size: .7rem;
      min-width: 36px;
      text-align: right
    }

    .effects-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 22px;
      margin-bottom: 4px
    }

    .eff-badge {
      font-size: .68rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600
    }

    .eff-blue {
      background: rgba(56, 139, 253, .2);
      color: var(--blue);
      border: 1px solid rgba(56, 139, 253, .3)
    }

    .eff-red {
      background: rgba(248, 81, 73, .2);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, .3)
    }

    .eff-yellow {
      background: rgba(210, 153, 34, .2);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, .3)
    }

    .eff-gray {
      background: rgba(139, 148, 158, .15);
      color: var(--t2);
      border: 1px solid var(--bg3)
    }

    .hand-cards-area {
      margin-top: 6px
    }

    .hand-back-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .card-back {
      width: var(--card-w);
      height: var(--card-h);
      background: repeating-linear-gradient(45deg, var(--bg2) 0, var(--bg2) 8px, var(--bg3) 8px, var(--bg3) 16px);
      border-radius: 8px;
      border: 1px solid var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--t3)
    }

    .hand-count {
      font-size: .8rem;
      color: var(--t2);
      margin-top: 4px
    }

    .hand-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .hand-groups {
      display: flex;
      gap: 16px;
      flex-wrap: wrap
    }

    .hand-group {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .hand-group-label {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase
    }

    .hand-group-label.policy-label {
      color: var(--blue)
    }

    .hand-group-label.disaster-label {
      color: var(--red)
    }

    .hand-group-cards {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    /* CARD */
    .card {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: .2s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative
    }

    .card:hover:not(.card-disabled) {
      transform: translateY(-8px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .6)
    }

    .card-disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .card.disaster {
      background: linear-gradient(160deg, #2d0d0d, #1a0a0a);
      border-color: #f85149
    }

    .card.policy {
      background: linear-gradient(160deg, #0d1a2d, #0a1020);
      border-color: #388bfd
    }

    .card-header {
      padding: 5px 6px;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .card.disaster .card-header {
      background: rgba(248, 81, 73, .2)
    }

    .card.policy .card-header {
      background: rgba(56, 139, 253, .2)
    }

    .card-icon {
      font-size: 1rem
    }

    .card-cost {
      margin-left: auto;
      font-size: .75rem;
      font-weight: 700;
      background: var(--bg0);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .card.disaster .card-cost {
      color: var(--red)
    }

    .card.policy .card-cost {
      color: var(--blue)
    }

    .card-name {
      padding: 4px 6px;
      font-size: .75rem;
      font-weight: 700;
      line-height: 1.2
    }

    .card-desc {
      padding: 0 6px 6px;
      font-size: .62rem;
      color: var(--t2);
      line-height: 1.35;
      flex: 1
    }

    .card-type-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: .55rem;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 600
    }

    .card.disaster .card-type-badge {
      background: rgba(248, 81, 73, .2);
      color: var(--red)
    }

    .card.policy .card-type-badge {
      background: rgba(56, 139, 253, .2);
      color: var(--blue)
    }

    .card-disabled-reason {
      font-size: .65rem;
      color: var(--t3);
      text-align: center;
      margin-top: 4px
    }

    /* STATUS BAR */
    .status-bar {
      background: var(--bg2);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--bg3)
    }

    .turn-badge {
      font-size: .8rem;
      font-weight: 700;
      color: var(--t2)
    }

    .budget-display {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .budget-label {
      font-size: .75rem;
      color: var(--t2)
    }

    .budget-pips {
      display: flex;
      gap: 3px
    }

    .pip {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--bg3)
    }

    .pip.used {
      background: var(--bg0)
    }

    .pip.avail {
      background: var(--green)
    }

    .status-bar .spacer {
      flex: 1
    }

    .btn-end {
      padding: 7px 20px;
      font-size: .85rem;
      font-weight: 700;
      background: var(--bg3);
      border: none;
      border-radius: 8px;
      color: var(--t1);
      cursor: pointer;
      transition: .2s
    }

    .btn-end:hover {
      background: var(--blue);
      color: #fff
    }

    /* LOG */
    .log-area {
      background: var(--bg1);
      border-radius: 10px;
      padding: 10px 12px;
      max-height: 100px;
      overflow-y: auto;
      border: 1px solid var(--bg3)
    }

    .log-entry {
      font-size: .75rem;
      color: var(--t2);
      padding: 2px 0;
      border-bottom: 1px solid var(--bg3)
    }

    .log-entry:last-child {
      border-bottom: none;
      color: var(--t1)
    }

    .log-entry.dmg {
      color: var(--red)
    }

    .log-entry.heal {
      color: var(--green)
    }

    .log-entry.policy {
      color: var(--blue)
    }

    .log-entry.sys {
      color: var(--yellow);
      font-weight: 600
    }

    /* RESPONSE */
    .response-pending-bar {
      background: rgba(248, 81, 73, .1);
      border: 1px solid var(--red);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .rpb-icon {
      font-size: 1.4rem
    }

    .rpb-text {
      flex: 1;
      font-size: .85rem;
      color: var(--t1);
      line-height: 1.4;
      min-width: 160px
    }

    .btn-respond {
      padding: 6px 16px;
      background: var(--red);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer
    }

    .btn-skip-resp {
      padding: 6px 16px;
      background: var(--bg3);
      border: none;
      border-radius: 7px;
      color: var(--t1);
      font-size: .82rem;
      cursor: pointer
    }

    /* CONFIRM MODAL */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999
    }

    .confirm-box {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .6)
    }

    .confirm-box .confirm-card-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700
    }

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.random() * (i + 1) | 0;[arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    function createDeck() { const d = []; for (const c of ALL_CARDS) for (let i = 0; i < 3; i++)d.push({ ...c, uid: c.id + '_' + i }); return shuffle(d); }

    function resolveDamage(attackCard, defIdx, responseCard) {

        if (attackCard.specialType === 'discard_policy') {
          const pols = def.hand.filter(c => c.type === 'policy');
          if (pols.length > 0) { const d = pols[Math.random() * pols.length | 0]; def.hand.splice(def.hand.indexOf(d), 1); G.discard.push(d); log.push(`→ 台風：${def.name}の政策カード1枚が捨てられた`); G._nextTurnEvents[defIdx].push({ type: 'typhoon_discard', cardIcon: d.icon, cardName: d.name }); }
          else log.push('→ 台風：政策カードなし（効果なし）');
        }
      }
      // 都市能力
      if (!abilityDisabled && defCity) {
        if (defCity.abilityType === 'resist_quake_fire' && (attackCard.id === 'earthquake' || attackCard.id === 'wildfire')) { dmg -= defCity.abilityValue; log.push(`→ ${defCity.name}の能力 −${defCity.abilityValue}`); }
        if (defCity.abilityType === 'resist_landslide' && attackCard.id === 'landslide') { dmg -= defCity.abilityValue; log.push(`→ ${defCity.name}の能力 −${defCity.abilityValue}`); }
        if (defCity.abilityType === 'resist_flood' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { dmg -= defCity.abilityValue; log.push(`→ ${defCity.name}の能力 −${defCity.abilityValue}`); }
        if (defCity.abilityType === 'resist_compound' && attackCard.id === 'compound') { dmg -= defCity.abilityValue; log.push(`→ ${defCity.name}の能力 −${defCity.abilityValue}`); }
        if (defCity.abilityType === 'second_hit_reduce' && def.effects.disastersReceivedThisTurn >= 1) { dmg -= defCity.abilityValue; log.push(`→ ${defCity.name}の能力（連続災害）−${defCity.abilityValue}`); }
        if (defCity.abilityType === 'quake_regen' && attackCard.id === 'earthquake') def.effects.quakeHitThisTurn = true;
        if (defCity.abilityType === 'flood_budget' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { def.effects.floodBonusTurns = 1; log.push(`→ ${defCity.name}の能力：次ターン予算+1`); }
        if (defCity.abilityType === 'quake_draw' && attackCard.id === 'earthquake') { drawCards(defIdx, defCity.abilityValue); autoDiscard(defIdx); log.push(`→ ${defCity.name}の能力：${defCity.abilityValue}枚ドロー`); }
      }
      def.effects.disastersReceivedThisTurn++;
      // 防災庁
      if (def.effects.damageReduceHits > 0) { dmg -= 20; def.effects.damageReduceHits--; log.push(`→ 防災庁設置で −20（残${def.effects.damageReduceHits}回）`); G._nextTurnEvents[defIdx].push({ type: 'disaster_agency_remaining', remaining: def.effects.damageReduceHits }); }
      // シールド（事前）
      if (def.effects.shieldQuakeFire && (attackCard.id === 'earthquake' || attackCard.id === 'wildfire')) { dmg -= 30; def.effects.shieldQuakeFire = false; log.push('→ 耐震補強で −30（シールド消費）'); }
      if (def.effects.shieldFlood && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { dmg -= 20; def.effects.shieldFlood = false; log.push('→ 堤防建設で −20（シールド消費）'); }
      // 対応カード
      if (responseCard && responseCard.effectType !== 'negate_special' && responseCard.effectType !== 'heal') {
        applyPolicyEffect(responseCard, defIdx, true);
        if (responseCard.effectType === 'shield_quake_fire' && (attackCard.id === 'earthquake' || attackCard.id === 'wildfire')) { dmg -= 30; def.effects.shieldQuakeFire = false; log.push('→ 耐震補強（対応）−30'); }
        if (responseCard.effectType === 'shield_flood' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { dmg -= 20; def.effects.shieldFlood = false; log.push('→ 堤防建設（対応）−20'); }
      }
      // N.オーリンズ
      if (!abilityDisabled && defCity && defCity.abilityType === 'vulnerability_draw' && def.hand.length <= 2) {
        dmg += defCity.abilityValue; log.push(`→ 脆弱性：手札${def.hand.length}枚 +${defCity.abilityValue}`);
        drawCards(defIdx, 1); autoDiscard(defIdx); log.push('→ N.オーリンズ底力：1枚ドロー');
      }
      // ダメージ確定
      dmg = Math.max(0, dmg); def.cityHps[def.activeCityIdx] -= dmg;
      let finalHp = def.cityHps[def.activeCityIdx]; const hpAD = finalHp;
      // 回復（対応カード）
      let healLog = null; let healAmt = 0; let healName = null;
      if (responseCard && responseCard.effectType === 'heal') {
        if (finalHp > 0) { const mxHp = getActiveMaxHp(defIdx); const bh = finalHp; finalHp = Math.min(finalHp + responseCard.value, mxHp); def.cityHps[def.activeCityIdx] = finalHp; healAmt = finalHp - bh; healName = responseCard.name; healLog = { type: 'heal', msg: `💚 ${def.name}「${responseCard.name}」→ HP +${healAmt}（${bh} → ${finalHp}）` }; }
        else healLog = { type: 'sys', msg: `💔 ${def.name}：都市壊滅のため「${responseCard.name}」の回復は無効` };
      }
      if (fromHp !== finalHp) queueHpAnim(defIdx, fromHp, finalHp);
      const aN = G.players[G.pendingAttack.attackerIdx].name;
      addLog(`💥 ${aN}が「${attackCard.name}」→ ${dmg}ダメージ（${def.name}残HP:${Math.max(0, finalHp)}）`, 'dmg');
      for (const l of log) addLog(l);
      if (healLog) addLog(healLog.msg, healLog.type);
      G._nextTurnEvents[defIdx].push({ type: 'damage', cardIcon: attackCard.icon, cardName: attackCard.name, baseDamage: attackCard.baseDamage, details: [...log], damage: dmg, hpBefore: fromHp, hpAfterDamage: Math.max(0, hpAD), hpAfter: Math.max(0, finalHp), healAmount: healAmt, healCardName: healName });
    }

    // ═══════════════════════════════════════
    // POLICY EFFECTS
    // ═══════════════════════════════════════
    function applyPolicyEffect(card, pi, asResponse) {
      const p = G.players[pi];
      switch (card.effectType) {
        case 'shield_quake_fire': p.effects.shieldQuakeFire = true; if (!asResponse) addLog(`🔵 ${p.name}「${card.name}」→ 地震・大火災シールド`, 'policy'); break;
        case 'shield_flood': p.effects.shieldFlood = true; if (!asResponse) addLog(`🔵 ${p.name}「${card.name}」→ 洪水・津波シールド`, 'policy'); break;
        case 'heal': { const mxHp = getActiveMaxHp(pi); const fh = p.cityHps[p.activeCityIdx]; p.cityHps[p.activeCityIdx] = Math.min(p.cityHps[p.activeCityIdx] + card.value, mxHp); queueHpAnim(pi, fh, p.cityHps[p.activeCityIdx]); addLog(`💚 ${p.name}「${card.name}」→ HP +${card.value}（現在:${p.cityHps[p.activeCityIdx]}）`, 'heal'); break; }
        case 'draw': G.turnDrawState = { pi, drawn: 0, target: card.value, revealed: null, isHazardMap: true }; G.screen = 'turnDraw'; addLog(`🗺️ ${p.name}「${card.name}」→ ${card.value}枚ドロー中…`, 'policy'); break;
        case 'negate_special': p.effects.negateSpecial = true; addLog(`🔵 ${p.name}「${card.name}」→ 次の特殊効果を無効化`, 'policy'); break;
        case 'damage_reduce_2t': p.effects.damageReduceHits = 2; addLog(`🔵 ${p.name}「${card.name}」→ 全ダメージ −20（次2回）`, 'policy'); break;
        case 'peek': { const opp = G.players[pi === 0 ? 1 : 0]; if (opp.hand.length > 0) { G.peekCard = opp.hand[Math.random() * opp.hand.length | 0]; addLog(`🔵 ${p.name}「${card.name}」→ 相手の手札を1枚確認`, 'policy'); G.screen = 'peek'; } else addLog(`🔵 ${p.name}「${card.name}」→ 相手の手札なし`, 'policy'); break; }
      }
    }

    // ═══════════════════════════════════════
    // TURN MANAGEMENT (online: handoverなし)
    // ═══════════════════════════════════════
    function setupTurnDraw(pi) {
      const p = G.players[pi]; p.budgetUsed = 0; p.effects.disastersReceivedThisTurn = 0;
      if (p.effects.floodBonusTurns > 0) p.effects.floodBonusTurns--;
      const target = Math.min(2, Math.max(0, 5 - p.hand.length));
      if (target === 0) { addLog(`─── ${p.name}のターン開始（予算${getBudget(pi)}・手札満杯のためドローなし）`, 'sys'); G.screen = 'main'; }
      else { G.turnDrawState = { pi, drawn: 0, target, revealed: null }; G.screen = 'turnDraw'; }
    }

    function endTurn() {
      const p = G.players[G.activePlayer]; const city = getActiveCity(G.activePlayer);
      if (city && city.abilityType === 'regen') { const mxHp = city.hp; const fh = p.cityHps[p.activeCityIdx]; p.cityHps[p.activeCityIdx] = Math.min(p.cityHps[p.activeCityIdx] + city.abilityValue, mxHp); if (p.cityHps[p.activeCityIdx] !== fh) queueHpAnim(G.activePlayer, fh, p.cityHps[p.activeCityIdx]); addLog(`💚 ${city.name}の回復能力 +${city.abilityValue}（HP:${p.cityHps[p.activeCityIdx]}）`, 'heal'); const opp = G.activePlayer === 0 ? 1 : 0; G._nextTurnEvents[opp].push({ type: 'opp_regen', cityIcon: city.icon, cityName: city.name, amount: city.abilityValue, hpBefore: fh, hpAfter: p.cityHps[p.activeCityIdx] }); }
      if (city && city.abilityType === 'quake_regen' && p.effects.quakeHitThisTurn) { const fh = p.cityHps[p.activeCityIdx]; p.cityHps[p.activeCityIdx] = Math.min(p.cityHps[p.activeCityIdx] + city.abilityValue, city.hp); if (p.cityHps[p.activeCityIdx] !== fh) queueHpAnim(G.activePlayer, fh, p.cityHps[p.activeCityIdx]); addLog(`💚 ${city.name}の能力（地震後回復）+${city.abilityValue}`, 'heal'); const opp = G.activePlayer === 0 ? 1 : 0; G._nextTurnEvents[opp].push({ type: 'opp_regen', cityIcon: city.icon, cityName: city.name, amount: city.abilityValue, hpBefore: fh, hpAfter: p.cityHps[p.activeCityIdx] }); }
      p.effects.quakeHitThisTurn = false;
      G.turnsEach[G.activePlayer]++; const next = G.activePlayer === 0 ? 1 : 0; G.activePlayer = next;
      const evts = G._nextTurnEvents[next];
      if (evts.length > 0) { G._turnSummary = [...evts]; G._nextTurnEvents[next] = []; G.screen = 'turnSummary'; }
      else setupTurnDraw(next);
      pushState(); render();
    }

    // ═══════════════════════════════════════
    // GACHA / DRAFT
    // ═══════════════════════════════════════
    function pullGacha() { const rem = CITIES.filter(c => !G.gachaPickedIds.includes(c.id)); G.gachaCurrent.revealed = rem[Math.random() * rem.length | 0]; pushState(); render(); }

    function acceptGachaCity() {
      const gc = G.gachaCurrent; const city = gc.revealed; const p = G.players[gc.playerIdx];
      p.cities.push(city); p.cityHps.push(city.hp); G.gachaPickedIds.push(city.id);
      if (gc.pickNum === 0) { gc.pickNum = 1; gc.revealed = null; pushState(); render(); }
      else if (gc.playerIdx === 0) { G.gachaCurrent = { playerIdx: 1, pickNum: 0, revealed: null }; G.screen = 'gacha'; pushState(); render(); }
      else { G.deck = createDeck(); G.discard = []; G.log = []; G.turnsEach = [0, 0]; G.activePlayer = 0; G.players.forEach(p => { p.hand = []; p.budgetUsed = 0; p.effects = mkEffects(); }); startDraft(0); pushState(); render(); }
    }

    function startDraft(pi) { G.draftState = { playerIdx: pi, picksDone: 0, picksTarget: 4, revealed: null, needPolicy: 2, needDisaster: 2 }; G.screen = 'draft'; }

    function pullDraftCard() {
      const ds = G.draftState; const needP = ds.needPolicy, needD = ds.needDisaster; let pool;
      if (needP > 0 && needD > 0) pool = G.deck.filter(c => c.type === 'policy' || c.type === 'disaster');
      else if (needP > 0) pool = G.deck.filter(c => c.type === 'policy');
      else if (needD > 0) pool = G.deck.filter(c => c.type === 'disaster');
      else pool = [...G.deck];
      if (pool.length === 0) { if (G.discard.length === 0) return; G.deck = shuffle([...G.discard, ...G.deck]); G.discard = []; pullDraftCard(); return; }
      const card = pool[Math.random() * pool.length | 0]; G.deck.splice(G.deck.indexOf(card), 1); ds.revealed = card; pushState(); render();
    }

    function acceptDraftCard() {
      const ds = G.draftState; if (!ds.revealed) return;
      if (ds.revealed.type === 'policy' && ds.needPolicy > 0) ds.needPolicy--;
      else if (ds.revealed.type === 'disaster' && ds.needDisaster > 0) ds.needDisaster--;
      G.players[ds.playerIdx].hand.push(ds.revealed); ds.revealed = null; ds.picksDone++;
      if (ds.picksDone >= ds.picksTarget) {
        if (ds.playerIdx === 0) { startDraft(1); pushState(); render(); }
        else { G.activePlayer = 0; G.players[0].budgetUsed = 0; addLog(`─── ${G.players[0].name}のターン開始（予算${getBudget(0)}）`, 'sys'); G.screen = 'main'; pushState(); render(); }
      } else { G.screen = 'draft'; pushState(); render(); }
    }

    function pullTurnCard() {
      const ts = G.turnDrawState; if (ts.revealed) return;
      if (G.deck.length === 0) { if (G.discard.length === 0) return; G.deck = shuffle([...G.discard]); G.discard = []; addLog('山札をシャッフルしました', 'sys'); }
      ts.revealed = G.deck.shift(); pushState(); render();
    }

    function acceptTurnCard() {
      const ts = G.turnDrawState; if (!ts.revealed) return;
      const pi = ts.pi ?? ts.playerIdx;
      G.players[pi].hand.push(ts.revealed); ts.drawn++; ts.revealed = null;
      if (ts.drawn >= ts.target) {
        G.turnDrawState = null;
        if (ts.isHazardMap) addLog(`🗺️ ${G.players[pi].name}：ハザードマップで${ts.target}枚ドロー完了`, 'policy');
        else addLog(`─── ${G.players[pi].name}のターン開始（予算${getBudget(pi)}・${ts.target}枚ドロー）`, 'sys');
        if (!handleDiscardIfNeeded(pi, 'main')) goMain();
      } else { pushState(); render(); }
    }

    // ═══════════════════════════════════════
    // HP ANIMATION & BUDGET TOAST
    // ═══════════════════════════════════════
    let _hpQ = [];
    function queueHpAnim(pi, fh, th) { _hpQ.push({ pi, fh, th }); }
    function processHpAnims() {
      if (G.screen !== 'main' && G.screen !== 'response') return; if (G._turnSummary) return;
      const q = _hpQ.splice(0); for (const a of q) _animateHp(a.pi, a.fh, a.th);
    }
    function _animateHp(pi, fh, th) {
      const mxHp = getActiveMaxHp(pi); const fill = document.getElementById('hp-fill-' + pi); const text = document.getElementById('hp-text-' + pi);
      if (!fill || !text) return;
      fill.style.transition = 'none'; fill.style.width = Math.max(0, fh / mxHp * 100) + '%'; fill.style.background = hpColor(fh, mxHp); fill.offsetWidth;
      fill.style.transition = 'width .6s ease, background .6s ease'; fill.style.width = Math.max(0, th / mxHp * 100) + '%'; fill.style.background = hpColor(th, mxHp);
      text.style.color = hpColor(th, mxHp); text.textContent = Math.max(0, th) + '/' + mxHp;
    }
    function showBudgetToast(cost, rem, tot) {
      setTimeout(() => { const t = document.createElement('div'); t.className = 'budget-toast'; t.innerHTML = `<span style="color:var(--yellow)">−${cost}pt</span> 使用　残り <strong style="color:var(--green)">${rem}</strong><span style="color:var(--t2)">/${tot}</span>`; const a = document.getElementById('app'); if (a) a.appendChild(t); setTimeout(() => t.remove(), 1800); }, 0);
    }

    // ═══════════════════════════════════════
    // FIREBASE
    // ═══════════════════════════════════════
    function isFirebaseConfigured() { return FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY'; }
    function initFirebase() { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }

    function generateRoomCode() { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c = ''; for (let i = 0; i < 6; i++)c += chars[Math.random() * chars.length | 0]; return c; }

    function pushState() {
      if (!db || !roomId) return;
      const s = JSON.stringify({ ...G, confirm: null }); myLastPush = s;
      db.ref(`rooms/${roomId}/state`).set(s);
    }

    function listenToState() {
      db.ref(`rooms/${roomId}/state`).on('value', snap => {
        const data = snap.val(); if (!data || data === myLastPush) return;
        G = { ...JSON.parse(data), confirm: null }; render(); processHpAnims();
      });
    }

    async function createRoom() {
      const name = lobbyState.nameInput.trim();
      if (!name) { lobbyState.error = '名前を入力してください'; render(); return; }
      myRole = 'p1'; myPlayerIdx = 0; roomId = generateRoomCode(); G.players[0].name = name;
      try {
        await db.ref(`rooms/${roomId}`).set({ p1Name: name, p2Name: '', p2Joined: false, state: null });
        db.ref(`rooms/${roomId}/p2Joined`).on('value', snap => {
          if (snap.val() === true) {
            db.ref(`rooms/${roomId}/p2Joined`).off();
            db.ref(`rooms/${roomId}/p2Name`).get().then(s2 => {
              G.players[1].name = s2.val() || 'プレイヤー2';
              listenToState();
              G.gachaPickedIds = []; G.gachaCurrent = { playerIdx: 0, pickNum: 0, revealed: null }; G.screen = 'gacha';
              pushState(); render();
            });
          }
        });
        G.screen = 'waiting_connection'; render();
      } catch (e) { lobbyState.error = 'ルーム作成に失敗: ' + e.message; render(); }
    }

    async function joinRoom() {
      const name = lobbyState.nameInput.trim(); const code = lobbyState.joinCodeInput.trim().toUpperCase();
      if (!name) { lobbyState.error = '名前を入力してください'; render(); return; }
      if (code.length !== 6) { lobbyState.error = 'ルームコードは6文字です'; render(); return; }
      try {
        const snap = await db.ref(`rooms/${code}`).get();
        if (!snap.val()) { lobbyState.error = 'ルームが見つかりません'; render(); return; }
        if (snap.val().p2Joined) { lobbyState.error = 'このルームはすでに満員です'; render(); return; }
        myRole = 'p2'; myPlayerIdx = 1; roomId = code; G.players[1].name = name;
        await db.ref(`rooms/${roomId}/p2Name`).set(name);
        await db.ref(`rooms/${roomId}/p2Joined`).set(true);
        listenToState(); G.screen = 'waiting_connection'; render();
      } catch (e) { lobbyState.error = '参加に失敗: ' + e.message; render(); }
    }

    function generateQR() {
      const el = document.getElementById('qr-container'); if (!el || el.dataset.generated) return; el.dataset.generated = 'true';
      const base = window.location.href.split('?')[0];
      const url = `${base}?room=${roomId}`;
      try { new QRCode(el, { text: url, width: 150, height: 150, colorDark: '#e6edf3', colorLight: '#0d1117' }); }
      catch (e) { el.innerHTML = `<div style="color:var(--t3);font-size:.75rem;padding:8px">QR生成失敗</div>`; }
    }

    // ═══════════════════════════════════════
    // VIEW DISPATCH
    // ═══════════════════════════════════════
    function myView() {
      if (!isFirebaseConfigured()) return 'setup_required';
      if (G.screen === 'lobby' || G.screen === 'waiting_connection') return G.screen;
      const mi = myPlayerIdx;
      switch (G.screen) {
        case 'gacha': return G.gachaCurrent?.playerIdx === mi ? 'gacha' : 'waiting';
        case 'draft': return G.draftState?.playerIdx === mi ? 'draft' : 'waiting';
        case 'turnDraw': { const pi = G.turnDrawState?.pi ?? G.turnDrawState?.playerIdx; return pi === mi ? 'turnDraw' : 'waiting'; }
        case 'turnSummary': return G.activePlayer === mi ? 'turnSummary' : 'waiting';
        case 'main':
          if (G.pendingAttack) { if (G.pendingAttack.attackerIdx === mi) return 'main'; if (G.pendingAttack.defenderIdx === mi) return 'waiting_response'; }
          return G.activePlayer === mi ? 'main' : 'waiting';
        case 'response': return G.pendingAttack?.defenderIdx === mi ? 'response' : 'waiting';
        case 'discard': { const pi = G.discardNeeded?.pi ?? G.discardNeeded?.playerIdx; return pi === mi ? 'discard' : 'waiting'; }
        case 'peek': return G.activePlayer === mi ? 'peek' : 'waiting';
        case 'gameover': return 'gameover';
        default: return 'waiting';
      }
    }

    // ═══════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════
    function render() {
      const app = document.getElementById('app'); const view = myView(); let html = '';
      switch (view) {
        case 'setup_required': html = renderSetupRequired(); break;
        case 'lobby': html = renderLobby(); break;
        case 'waiting_connection': html = renderWaitingConnection(); break;
        case 'gacha': html = renderGacha(); break;
        case 'draft': html = renderDraft(); break;
        case 'turnDraw': html = renderTurnDraw(); break;
        case 'turnSummary': html = renderTurnSummary(); break;
        case 'main': html = renderMain(false); break;
        case 'response': html = renderMain(true); break;
        case 'waiting_response': html = renderWaitingResponse(); break;
        case 'discard': html = renderDiscard(); break;
        case 'peek': html = renderPeek(); break;
        case 'gameover': html = renderGameOver(); break;
        case 'waiting': html = renderWaiting(); break;
      }
      if (G.confirm && (view === 'main' || view === 'response' || view === 'discard')) html += renderConfirmModal();
      app.innerHTML = html; processHpAnims();
      if (view === 'waiting_connection' && myRole === 'p1') setTimeout(generateQR, 80);
    }

    // ─── セットアップ必須 ───
    function renderSetupRequired() {
      return `<div class="screen active"><div class="setup-box">
    <div style="text-align:center;margin-bottom:20px"><div style="font-size:2.5rem">🔧</div><h2 style="color:var(--yellow);margin:8px 0">Firebase 設定が必要です</h2><p style="color:var(--t2);font-size:.85rem">このページを使うには Firebase Realtime Database の設定が必要です。</p></div>
    <div class="setup-step"><span class="setup-num">1</span><div><strong>Firebaseプロジェクト作成</strong><br><a href="https://console.firebase.google.com" target="_blank" style="color:var(--blue)">console.firebase.google.com</a> で無料プロジェクトを作成（Googleアカウント必要）</div></div>
    <div class="setup-step"><span class="setup-num">2</span><div><strong>Realtime Database を有効化</strong><br>「構築」→「Realtime Database」→「データベースを作成」→テストモードで開始</div></div>
    <div class="setup-step"><span class="setup-num">3</span><div><strong>設定情報をコピー</strong><br>「プロジェクトの設定」→「マイアプリ」→ Webアプリを登録 →「<code>firebaseConfig</code>」をコピー</div></div>
    <div class="setup-step"><span class="setup-num">4</span><div><strong>このファイルを編集</strong><br><code>game_online.html</code> 冒頭の <code>FIREBASE_CONFIG</code> に値を貼り付けて上書き保存</div></div>
  </div></div>`;
    }

    // ─── ロビー ───
    function renderLobby() {
      const nv = lobbyState.nameInput.replace(/"/g, '&quot;'); const jv = lobbyState.joinCodeInput.replace(/"/g, '&quot;');
