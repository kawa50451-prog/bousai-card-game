        body = `<div><label class="lobby-label">あなたの名前</label><input id="lobby-name" class="lobby-input" type="text" placeholder="例: 田中" maxlength="12" value="${nv}" oninput="lobbyState.nameInput=this.value"></div>
    ${err}
    <div class="lobby-mode-btns">
      <button class="lobby-btn host" onclick="handleHostClick()"><span style="font-size:1.5rem">🏠</span><strong>ルームを作成</strong><span style="font-size:.72rem;color:rgba(255,255,255,.6)">ホスト（先攻）</span></button>
      <button class="lobby-btn join" onclick="lobbyState.mode='join';lobbyState.error='';render()"><span style="font-size:1.5rem">🔗</span><strong>ルームに参加</strong><span style="font-size:.72rem;color:rgba(255,255,255,.6)">ゲスト（後攻）</span></button>
    </div>`;
      } else {
        body = `<div><label class="lobby-label">あなたの名前</label><input id="lobby-name" class="lobby-input" type="text" placeholder="例: 鈴木" maxlength="12" value="${nv}" oninput="lobbyState.nameInput=this.value"></div>
    <div><label class="lobby-label">ルームコード（6文字）</label><input id="lobby-code" class="lobby-input code-input" type="text" placeholder="AB3K7X" maxlength="6" value="${jv}" oninput="lobbyState.joinCodeInput=this.value.toUpperCase();this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')handleJoinClick()"></div>
    ${err}
    <button class="lobby-btn-single" onclick="handleJoinClick()">参加する</button>
    <button class="lobby-btn-back" onclick="lobbyState.mode='select';lobbyState.error='';render()">← 戻る</button>`;
      }
      return `<div class="screen active"><div class="lobby-wrap"><div class="lobby-box">
    <div class="lobby-hero"><div style="font-size:2.2rem">🌊⚡🔥</div><h1 class="lobby-title">都市防災カードバトル</h1><p style="color:var(--t2);font-size:.8rem">オンライン版 — 1人1デバイス</p></div>
    ${body}
    <div style="text-align:center;color:var(--t3);font-size:.7rem;margin-top:4px">簡易版 v3 ／ 2人用 ／ 各2都市 ／ 15〜20分</div>
  </div></div></div>`;
    }

    // ─── 接続待ち ───
    function renderWaitingConnection() {
      if (myRole === 'p1') {
        return `<div class="screen active"><div class="lobby-wrap"><div class="lobby-box">
      <div style="text-align:center"><div style="font-size:2rem;margin-bottom:6px">🏠 ホスト待機中</div><p style="color:var(--t2);font-size:.88rem">相手にルームコードまたはQRコードを共有してください</p></div>
      <div class="room-code-display"><div class="room-code-label">ルームコード</div><div class="room-code-value">${roomId || '------'}</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div id="qr-container" style="background:var(--bg2);padding:10px;border-radius:10px;border:1px solid var(--bg3);min-height:52px;display:flex;align-items:center;justify-content:center"></div>
        <div style="font-size:.7rem;color:var(--t3)">QRコードを読み取るか、上のコードを口頭で伝えてください</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(56,139,253,.08);border:1px solid rgba(56,139,253,.3);border-radius:8px;padding:10px 14px">
        <span class="pulse-dot" style="background:var(--blue);min-width:12px"></span>
        <span style="font-size:.85rem;color:var(--blue)">相手の接続を待っています...</span>
      </div>
      <div style="color:var(--t3);font-size:.75rem;text-align:center">${G.players[0].name} としてホスト中</div>
    </div></div></div>`;
      } else {
        return `<div class="screen active"><div class="lobby-wrap"><div class="lobby-box">
      <div style="text-align:center"><div style="font-size:2rem;margin-bottom:6px">🔗 参加完了</div><p style="color:var(--t2);font-size:.88rem">ホストがゲームを開始するまでお待ちください</p></div>
      <div class="room-code-display"><div class="room-code-label">接続中のルーム</div><div class="room-code-value">${roomId || '------'}</div></div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:10px 14px;margin-top:8px">
        <span class="pulse-dot" style="background:var(--green);min-width:12px"></span>
        <span style="font-size:.85rem;color:var(--green)">ホストの開始を待っています...</span>
      </div>
      <div style="color:var(--t3);font-size:.75rem;text-align:center">${G.players[1].name} として参加中</div>
    </div></div></div>`;
      }
    }

    // ─── 待機画面 ───
    function renderWaiting() {
      let msg = '';
      switch (G.screen) {
        case 'gacha': msg = `${G.players[G.gachaCurrent?.playerIdx ?? 0].name} が都市を選んでいます`; break;
        case 'draft': msg = `${G.players[G.draftState?.playerIdx ?? 0].name} が手札を引いています`; break;
        case 'turnDraw': { const pi = G.turnDrawState?.pi ?? G.turnDrawState?.playerIdx ?? 0; msg = `${G.players[pi].name} がカードを引いています`; } break;
        case 'turnSummary': msg = `${G.players[G.activePlayer].name} がターンサマリーを確認しています`; break;
        case 'response': msg = `${G.players[G.pendingAttack?.defenderIdx ?? 0].name} が対応カードを選んでいます`; break;
        case 'discard': { const pi = G.discardNeeded?.pi ?? G.discardNeeded?.playerIdx ?? 0; msg = `${G.players[pi].name} が捨て札を選んでいます`; } break;
        default: msg = `${G.players[G.activePlayer].name} のターンです`;
      }
      const showBoard = ['main', 'response'].includes(G.screen) && G.players[0].cities.length > 0;
      if (showBoard) {
        const mi = myPlayerIdx, oi = mi === 0 ? 1 : 0;
        return `<div class="screen active">
      <div class="waiting-banner"><span class="pulse-dot" style="background:var(--blue);min-width:10px;height:10px"></span><span>⏳ ${msg}</span></div>
      ${renderZoneReadOnly(oi, 'opponent')}
      <div class="log-area">${G.log.slice(0, 4).map(l => `<div class="log-entry ${l.cls}">${l.msg}</div>`).join('') || '<div class="log-entry sys">待機中</div>'}</div>
      ${renderZoneReadOnly(mi, 'player')}
    </div>`;
      }
      return `<div class="screen active"><div class="wait-screen">
    <div class="wait-icon">⏳</div><div class="wait-title">${msg}</div>
    <div class="wait-sub">相手の操作をお待ちください</div>
  </div></div>`;
    }

    // ─── 対応待ち（守備側が攻撃宣言後に相手の選択を待つ） ───
    function renderWaitingResponse() {
      const atk = G.pendingAttack; if (!atk) return renderWaiting();
      const mi = myPlayerIdx, oi = mi === 0 ? 1 : 0;
      return `<div class="screen active">
    <div class="waiting-banner red">⚔️ ${G.players[atk.attackerIdx].name}が「${atk.card.icon} ${atk.card.name}」を宣言！対応フェーズの確認を待っています...</div>
    ${renderZoneReadOnly(oi, 'opponent')}
    <div class="response-pending-bar">
      <div class="rpb-icon">⚠️</div>
      <div class="rpb-text"><strong>${G.players[atk.attackerIdx].name}が「${atk.card.icon} ${atk.card.name}」を使用！</strong><br>相手が「対応を確認」か「対応しない」を選んでいます...</div>
    </div>
    <div class="log-area">${G.log.slice(0, 4).map(l => `<div class="log-entry ${l.cls}">${l.msg}</div>`).join('')}</div>
    ${renderZoneReadOnly(mi, 'player')}
  </div>`;
    }

    // ─── 読み取り専用ゾーン ───
    function renderZoneReadOnly(idx, position) {
      const p = G.players[idx]; if (!p || !p.cities || p.cities.length === 0) return '';
      const c = getActiveCity(idx); const hp = getActiveCityHp(idx); const mxHp = getActiveMaxHp(idx);
      const isMe = (idx === myPlayerIdx);
      return `<div class="${position}-zone">
    <div class="zone-header"><span class="zone-label">${isMe ? 'あなた' : '相手'}</span><span class="city-icon-sm">${c ? c.icon : ''}</span><span class="city-name-display">${p.name}の都市：${c ? c.name : '?'}</span></div>
    <div class="hp-section"><div class="hp-bar-wrap"><div class="hp-bar-fill" style="width:${Math.max(0, hp / mxHp * 100)}%;background:${hpColor(hp, mxHp)}"></div></div><div class="hp-text" style="color:${hpColor(hp, mxHp)}">${Math.max(0, hp)}/${mxHp}</div></div>
    ${renderBackupCity(idx)}
    <div class="effects-row">${renderEffectBadges(p.effects)}</div>
    <div class="hand-cards-area">
      ${isMe ? renderPlayerHandReadOnly(p) : `<div class="hand-back-row">${Array(p.hand.length).fill('<div class="card-back">🂠</div>').join('')}</div>`}
      <div class="hand-count">手札 ${p.hand.length} 枚</div>
    </div>
  </div>`;
    }

    // ─── ガチャ ───
    function renderGacha() {
      const gc = G.gachaCurrent; const p = G.players[gc.playerIdx];
      let firstPickInfo = '';
      if (gc.pickNum === 1 && p.cities.length > 0) { const fc = p.cities[0]; firstPickInfo = `<div class="gacha-first-pick">✅ 1枚目：${fc.icon} <strong>${fc.name}</strong>　${fc.abilityDesc}</div>`; }
      let ca = '';
      if (!gc.revealed) { ca = `<div class="gacha-mystery" onclick="pullGacha()"><div style="font-size:5rem;margin-bottom:12px">🎴</div><div style="font-size:.95rem;color:var(--t2)">どの都市が出るか…？</div><div style="font-size:.75rem;color:var(--t3);margin-top:6px">タップして引く</div></div><button class="btn-gacha" onclick="pullGacha()">🎲 ガチャを引く！</button>`; }
      else { const c = gc.revealed; ca = `<div class="gacha-card-box gacha-reveal"><div style="font-size:4rem;margin-bottom:10px">${c.icon}</div><div style="font-size:1.5rem;font-weight:700;margin-bottom:6px">${c.name}</div><div style="font-size:.85rem;color:var(--green);margin-bottom:8px">HP: ${c.hp}</div><div style="font-size:.9rem;color:var(--blue);font-weight:700;margin-bottom:10px">${c.abilityDesc}</div><div style="font-size:.7rem;color:var(--t3);line-height:1.5">${c.concept}</div></div><button class="btn-accept" onclick="acceptGachaCity()">✅ この都市で進む</button>`; }
      return `<div class="screen active"><div class="section-title">🎲 ${p.name} — ${gc.pickNum === 0 ? '1枚目' : '2枚目'}の都市ガチャ</div>${firstPickInfo}<div class="gacha-stage">${ca}</div></div>`;
    }

    // ─── 予備都市 ───
    function renderBackupCity(pi) {
      const p = G.players[pi]; if (p.activeCityIdx !== 0) return `<div style="font-size:.7rem;color:var(--t3);margin-bottom:4px">予備都市なし</div>`; if (p.cities.length < 2) return '';
      const bc = p.cities[1]; const bHp = p.cityHps[1]; const pct = Math.max(0, bHp / bc.hp * 100);
      return `<div class="backup-city-row"><span class="backup-label">予備: ${bc.icon} ${bc.name}</span><div class="hp-bar-mini"><div class="hp-bar-mini-fill" style="width:${pct}%;background:${hpColor(bHp, bc.hp)}"></div></div><span class="backup-hp-text" style="color:${hpColor(bHp, bc.hp)}">${bHp}/${bc.hp}</span></div>`;
    }

    // ─── 効果バッジ ───
    function renderEffectBadges(eff) {
      const b = [];
      if (eff.shieldQuakeFire) b.push(`<span class="eff-badge eff-blue">🏗️ 耐震シールド</span>`);
      if (eff.shieldFlood) b.push(`<span class="eff-badge eff-blue">🌊 堤防シールド</span>`);
      if (eff.negateSpecial) b.push(`<span class="eff-badge eff-blue">📢 特殊効果無効</span>`);
      if (eff.damageReduceHits > 0) b.push(`<span class="eff-badge eff-yellow">🏛️ 全ダメ−20（残${eff.damageReduceHits}回）</span>`);
      if (eff.abilityDisabledHits > 0) b.push(`<span class="eff-badge eff-red">⚡ 能力無効化（残${eff.abilityDisabledHits}回）</span>`);
      if (eff.floodBonusTurns > 0) b.push(`<span class="eff-badge eff-blue">💧 予算+1</span>`);
      return b.join('') || `<span class="eff-badge eff-gray">効果なし</span>`;
    }

    // ─── 手札描画（操作可能） ───
    function renderPlayerHand(p, pi) {
      const isFirstTurn = (pi === 0 && G.turnsEach[0] === 0); const left = getBudgetLeft(pi);
      function mkCard(card) {
        const cantAfford = left < card.cost; const ftBlk = isFirstTurn && card.type === 'disaster'; const dis = cantAfford || ftBlk;
        let reason = ''; if (cantAfford) reason = '予算不足'; else if (ftBlk) reason = '先攻1ターン目は使用不可';
        const oc = dis ? '' : `requestConfirm('playCard','${card.uid}','${card.name.replace(/'/g, "\\'")}','${card.icon}','${card.type}','使用')`;
        return `<div class="card ${card.type} ${dis ? 'card-disabled' : ''}" onclick="${oc}" style="cursor:${dis ? 'not-allowed' : 'pointer'}"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost">${card.cost}</span></div><div class="card-name">${card.name}</div><div class="card-desc">${card.desc}</div><span class="card-type-badge">${card.type === 'policy' ? '政策' : '災害'}</span>${reason ? `<div class="card-disabled-reason">${reason}</div>` : ''}</div>`;
      }
      const pols = p.hand.filter(c => c.type === 'policy').sort((a, b) => a.cost - b.cost);
      const dis = p.hand.filter(c => c.type === 'disaster').sort((a, b) => a.cost - b.cost);
      const s = [];
      if (pols.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label policy-label">政策</div><div class="hand-group-cards">${pols.map(mkCard).join('')}</div></div>`);
      if (dis.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label disaster-label">災害</div><div class="hand-group-cards">${dis.map(mkCard).join('')}</div></div>`);
      return `<div class="hand-groups">${s.join('')}</div>`;
    }

    // ─── 手札描画（読み取り専用：自分のターン外） ───
    function renderPlayerHandReadOnly(p) {
      function mkCard(card) { return `<div class="card ${card.type} card-disabled" style="cursor:default"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost">${card.cost}</span></div><div class="card-name">${card.name}</div><div class="card-desc">${card.desc}</div><span class="card-type-badge">${card.type === 'policy' ? '政策' : '災害'}</span></div>`; }
      const pols = p.hand.filter(c => c.type === 'policy').sort((a, b) => a.cost - b.cost);
      const dis = p.hand.filter(c => c.type === 'disaster').sort((a, b) => a.cost - b.cost);
      const s = [];
      if (pols.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label policy-label">政策</div><div class="hand-group-cards">${pols.map(mkCard).join('')}</div></div>`);
      if (dis.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label disaster-label">災害</div><div class="hand-group-cards">${dis.map(mkCard).join('')}</div></div>`);
      return `<div class="hand-groups">${s.join('')}</div>`;
    }

    // ─── 手札描画（対応フェーズ） ───
    function renderResponseHand(p) {
      if (p.hand.length === 0) return `<div style="color:var(--t3);font-size:.85rem;padding:10px">手札なし</div>`;
      function mkCard(card) { const dis = card.type !== 'policy'; const oc = dis ? '' : `requestConfirm('playResponseCard','${card.uid}','${card.name.replace(/'/g, "\\'")}','${card.icon}','${card.type}','対応に使用')`; return `<div class="card ${card.type} ${dis ? 'card-disabled' : ''}" onclick="${oc}" style="cursor:${dis ? 'not-allowed' : 'pointer'}"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost" style="font-size:.6rem">${dis ? card.cost + 'pt' : '無料'}</span></div><div class="card-name">${card.name}</div><div class="card-desc">${card.desc}</div><span class="card-type-badge">${dis ? '災害（使用不可）' : '対応'}</span>${dis ? `<div class="card-disabled-reason">対応フェーズは政策カードのみ</div>` : ''}</div>`; }
      const pols = p.hand.filter(c => c.type === 'policy').sort((a, b) => a.cost - b.cost);
      const dis = p.hand.filter(c => c.type === 'disaster').sort((a, b) => a.cost - b.cost);
      const s = [];
      if (pols.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label policy-label">政策（対応可）</div><div class="hand-group-cards">${pols.map(mkCard).join('')}</div></div>`);
      if (dis.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label disaster-label">災害（使用不可）</div><div class="hand-group-cards">${dis.map(mkCard).join('')}</div></div>`);
      return `<div class="hand-groups">${s.join('')}</div>`;
    }

    // ─── メインゲーム（自分が常に下ゾーン） ───
    function renderMain(isResponsePhase) {
      const mi = myPlayerIdx, oi = mi === 0 ? 1 : 0; const ap = G.activePlayer;
      const deviceHolder = isResponsePhase ? G.pendingAttack.defenderIdx : ap;
      const amIHolder = (deviceHolder === mi);
      const budget = getBudget(ap), left = getBudgetLeft(ap);
      const hasPending = !!G.pendingAttack; const isMyAttack = hasPending && G.pendingAttack.attackerIdx === mi;

      function zoneHand(idx) {
        const isMe = (idx === mi);
        if (!isMe) return Array(G.players[idx].hand.length).fill('<div class="card-back">🂠</div>').join('');
        if (amIHolder) return isResponsePhase ? renderResponseHand(G.players[idx]) : renderPlayerHand(G.players[idx], idx);
        return renderPlayerHandReadOnly(G.players[idx]);
      }

      let pendingBar = '';
      if (hasPending) {
        if (isResponsePhase) {
          pendingBar = `<div class="response-pending-bar"><div class="rpb-icon">⚠️</div><div class="rpb-text"><strong>${G.players[G.pendingAttack.attackerIdx].name}が「${G.pendingAttack.card.icon} ${G.pendingAttack.card.name}」を使用！</strong><br>政策カードを1枚選んで対応、または「対応しない」を押してください。</div><button class="btn-skip-resp" onclick="skipResponse()">対応しない</button></div>`;
        } else if (isMyAttack) {
          pendingBar = `<div class="response-pending-bar"><div class="rpb-icon">⚔️</div><div class="rpb-text"><strong>「${G.pendingAttack.card.icon} ${G.pendingAttack.card.name}」を宣言！</strong><br>${G.players[G.pendingAttack.defenderIdx].name}に対応を確認しますか？</div><button class="btn-respond" onclick="goResponseHandover()">対応を確認</button><button class="btn-skip-resp" onclick="skipResponse()">対応しない</button></div>`;
        }
      }

      const logHtml = G.log.slice(0, 6).map(l => `<div class="log-entry ${l.cls}">${l.msg}</div>`).join('');
      let statusBar = '';
      if (ap === mi && !hasPending && !isResponsePhase) {
        statusBar = `<div class="status-bar"><span class="turn-badge">ターン ${G.turnsEach[ap] + 1} | ${G.players[ap].name}</span>
      <div class="budget-display"><span class="budget-label">予算</span><div class="budget-pips">${Array(budget).fill(0).map((_, i) => `<div class="pip ${i < (budget - left) ? 'used' : 'avail'}"></div>`).join('')}</div><span style="font-size:.8rem;font-weight:700;color:var(--green)">${left}<span style="color:var(--t3);font-weight:400">/${budget}</span></span></div>
      <span class="spacer"></span><button class="btn-end" onclick="endTurn()">ターン終了 →</button></div>`;
      }

      function renderZone(idx, position) {
        const p = G.players[idx]; const c = getActiveCity(idx); const hp = getActiveCityHp(idx); const mxHp = getActiveMaxHp(idx);
        const isHolder = (idx === deviceHolder); const isMe = (idx === mi);
        const label = isMe ? (isResponsePhase ? 'あなた（対応中）' : 'あなた') : (isHolder ? '相手（操作中）' : '相手（待機中）');
        const bdr = isHolder && isMe ? 'border-left:3px solid var(--green)' : isHolder && !isMe ? 'border-left:3px solid var(--red)' : '';
        return `<div class="${position}-zone" style="${bdr}">
      <div class="zone-header"><span class="zone-label">${label}</span><span class="city-icon-sm">${c ? c.icon : ''}</span><span class="city-name-display">${p.name}の都市：${c ? c.name : '?'}</span>${p.effects.abilityDisabledHits > 0 ? '<span class="eff-badge eff-red">能力無効</span>' : ''}</div>
      <div class="hp-section"><div class="hp-bar-wrap"><div class="hp-bar-fill" id="hp-fill-${idx}" style="width:${Math.max(0, hp / mxHp * 100)}%;background:${hpColor(hp, mxHp)}"></div></div><div class="hp-text" id="hp-text-${idx}" style="color:${hpColor(hp, mxHp)}">${Math.max(0, hp)}/${mxHp}</div></div>
      ${renderBackupCity(idx)}
      <div class="effects-row">${renderEffectBadges(p.effects)}</div>
      <div class="hand-cards-area">${isMe ? zoneHand(idx) : `<div class="hand-back-row">${zoneHand(idx)}</div>`}${!isMe ? `<div class="hand-count">手札 ${p.hand.length} 枚</div>` : ''}</div>
    </div>`;
      }

      return `<div class="screen active"><div class="battle-layout">
    ${statusBar}${renderZone(oi, 'opponent')}${pendingBar}
    <div class="log-area">${logHtml || '<div class="log-entry sys">ゲーム開始</div>'}</div>
    ${renderZone(mi, 'player')}
  </div></div>`;
    }

    // ─── 確認モーダル ───
    function renderConfirmModal() {
      const c = G.confirm; const tl = c.cardType === 'policy' ? '政策カード' : c.cardType === 'disaster' ? '災害カード' : 'カード';
      let hint = '';
      if (c.cardType === 'disaster' && c.fn === 'playCard') {
        const defIdx = G.activePlayer === 0 ? 1 : 0; const defCity = getActiveCity(defIdx); const card = G.players[G.activePlayer].hand.find(cd => cd.uid === c.uid);
        if (card && defCity && card.baseDamage) {
          const base = card.baseDamage; let bonus = 0; let bl = '';
          if (card.specialType === 'coastal_bonus' && defCity.isCoastal) { bonus = 10; bl = `${defCity.name}（海岸）`; }
          else if (card.specialType === 'mountain_bonus' && defCity.isMountain) { bonus = 10; bl = `${defCity.name}（山間部）`; }
          else if (card.specialType === 'inland_bonus' && !defCity.isCoastal && !defCity.isMountain) { bonus = 10; bl = `${defCity.name}（内陸）`; }
          if (bonus > 0) hint = `<div style="margin:4px 0;padding:6px 10px;background:rgba(248,81,73,.12);border-radius:6px;font-size:.8rem;text-align:center">基礎 <strong>${base}</strong> + <strong style="color:var(--red)">+${bonus}</strong> = <strong style="color:var(--red)">${base + bonus}</strong> ダメージ<br><span style="color:var(--t3);font-size:.7rem">${bl}に有効</span></div>`;
          else hint = `<div style="margin:4px 0;padding:5px 10px;background:rgba(139,148,158,.1);border-radius:6px;font-size:.8rem;color:var(--t2);text-align:center">基礎ダメージ <strong style="color:var(--t1)">${base}</strong></div>`;
        }
      }
      if (c.cardType === 'policy') {
        const pi = (c.fn === 'playResponseCard') ? G.pendingAttack.defenderIdx : G.activePlayer; const card = G.players[pi].hand.find(cd => cd.uid === c.uid);
        if (card) {
          const p = G.players[pi]; const curHp = p.cityHps[p.activeCityIdx]; const mxHp = getActiveMaxHp(pi); let h = '';
          if (card.effectType === 'heal') { const aH = Math.min(curHp + card.value, mxHp); h = `HP +${card.value} 回復　<strong style="color:var(--green)">${curHp} → ${aH}</strong>`; }
          else if (card.effectType === 'shield_quake_fire') { if (G.pendingAttack && (G.pendingAttack.card.id === 'earthquake' || G.pendingAttack.card.id === 'wildfire')) { const e = computeEstDmg(G.pendingAttack.card, pi); h = `この攻撃に適用：−30 → 予測 <strong style="color:var(--green)">${Math.max(0, e - 30)}</strong>`; } else h = '次の地震・大火災を −30（シールド設置）'; }
          else if (card.effectType === 'shield_flood') { if (G.pendingAttack && (G.pendingAttack.card.id === 'flood' || G.pendingAttack.card.id === 'tsunami')) { const e = computeEstDmg(G.pendingAttack.card, pi); h = `この攻撃に適用：−20 → 予測 <strong style="color:var(--green)">${Math.max(0, e - 20)}</strong>`; } else h = '次の洪水・津波を −20（シールド設置）'; }
          else if (card.effectType === 'negate_special') h = G.pendingAttack ? '特殊効果を無効化（基礎ダメージのみ）' : '次の災害の特殊効果を無効化';
          else if (card.effectType === 'damage_reduce_2t') { if (G.pendingAttack) { const e = computeEstDmg(G.pendingAttack.card, pi); h = `全ダメージ −20（次2回）→ 予測 <strong style="color:var(--green)">${Math.max(0, e - 20)}</strong>`; } else h = '全ダメージ −20（次2回の攻撃）'; }
          else if (card.effectType === 'draw') h = `山札から ${card.value} 枚ドロー`;
          else if (card.effectType === 'peek') h = '相手の手札 1 枚を確認';
          if (h) hint = `<div style="margin:4px 0;padding:6px 10px;background:rgba(56,139,253,.12);border-radius:6px;font-size:.8rem;color:var(--t2);text-align:center">${h}</div>`;
        }
      }
      return `<div class="confirm-overlay" onclick="cancelConfirm()"><div class="confirm-box" onclick="event.stopPropagation()">
    <div class="confirm-card-preview"><span class="ci">${c.icon}</span><span>${c.name}</span></div>
    ${hint}<p>${tl}を<strong style="color:${c.danger ? 'var(--red)' : 'var(--blue)'}">${c.actionLabel}</strong>しますか？</p>
    <div class="confirm-btns"><button class="btn-ok${c.danger ? ' danger' : ''}" onclick="doConfirm()">はい</button><button class="btn-cancel" onclick="cancelConfirm()">キャンセル</button></div>
  </div></div>`;
    }

    // ─── 捨て札選択 ───
    function renderDiscard() {
      const dn = G.discardNeeded; const pi = dn.pi ?? dn.playerIdx; const p = G.players[pi]; const excess = p.hand.length - 5;
      const cards = p.hand.map(card => `<div class="card ${card.type}" onclick="requestConfirm('discardCard','${card.uid}','${card.name.replace(/'/g, "\\'")}','${card.icon}','${card.type}','捨て札にする',true)" style="cursor:pointer"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost">${card.cost}</span></div><div class="card-name">${card.name}</div><div class="card-desc">${card.desc}</div><span class="card-type-badge">${card.type === 'policy' ? '政策' : '災害'}</span></div>`).join('');
      return `<div class="screen active"><div class="section-title">📤 ${p.name} — 捨てるカードを選んでください</div>
    <div class="discard-info">手札が上限（5枚）を超えています。<strong style="color:var(--red)">${excess}枚</strong>を捨ててください。<br><span style="font-size:.75rem;color:var(--t3)">カードをクリックすると捨て札になります</span></div>
    <div style="font-size:.8rem;color:var(--t2);text-align:center">現在の手札：<strong style="color:var(--yellow)">${p.hand.length}枚</strong>　→　目標：5枚</div>
    <div class="discard-cards">${cards}</div></div>`;
    }

    // ─── ターン開始ドロー ───
    function renderTurnDraw() {
      const ts = G.turnDrawState; const pi = ts.pi ?? ts.playerIdx; const p = G.players[pi];
      const pips = Array(ts.target).fill(0).map((_, i) => { const cls = i < ts.drawn ? 'done' : i === ts.drawn ? 'current' : ''; return `<div class="draft-pip ${cls}"></div>`; }).join('');
      let ca = '';
      if (!ts.revealed) { ca = `<div class="gacha-mystery" onclick="pullTurnCard()"><div style="font-size:5rem;margin-bottom:12px">🂠</div><div style="font-size:.95rem;color:var(--t2)">山札の中身は…？</div><div style="font-size:.75rem;color:var(--t3);margin-top:6px">タップして引く</div></div><button class="btn-gacha" onclick="pullTurnCard()">🃏 カードを引く！</button>`; }
      else { const c = ts.revealed; const tc = c.type === 'policy' ? 'var(--blue)' : 'var(--red)'; ca = `<div class="gacha-card-box gacha-reveal" style="border-color:${c.type === 'policy' ? 'rgba(56,139,253,.5)' : 'rgba(248,81,73,.5)'}"><div style="font-size:3.5rem;margin-bottom:8px">${c.icon}</div><div style="font-size:.75rem;font-weight:600;color:${tc};margin-bottom:4px">${c.type === 'policy' ? '政策カード' : '災害カード'}</div><div style="font-size:1.4rem;font-weight:700;margin-bottom:6px">${c.name}</div><div style="font-size:.85rem;color:var(--t2);margin-bottom:10px">${c.desc}</div><div style="background:var(--bg0);border-radius:20px;padding:4px 14px;display:inline-block;font-size:.8rem;font-weight:700;color:${tc}">コスト ${c.cost}</div></div><button class="btn-accept" onclick="acceptTurnCard()">✅ 手札に加える</button>`; }
      return `<div class="screen active"><div class="section-title">${ts.isHazardMap ? `🗺️ ${p.name} — ハザードマップ整備（${ts.drawn + 1}枚目／${ts.target}枚）` : `🃏 ${p.name} — ターン開始ドロー（${ts.drawn + 1}枚目／${ts.target}枚）`}</div>
    <div class="draft-progress"><div><span style="font-size:.8rem;color:var(--t2)">ドロー </span><strong style="color:var(--yellow)">${ts.drawn} / ${ts.target}</strong><span style="font-size:.8rem;color:var(--t2)"> 枚</span></div><div class="draft-pips">${pips}</div></div>
    <div class="gacha-stage">${ca}</div></div>`;
    }

    // ─── 初期ドラフト ───
    function renderDraft() {
      const ds = G.draftState; const p = G.players[ds.playerIdx];
      const pips = Array(ds.picksTarget).fill(0).map((_, i) => { const cls = i < ds.picksDone ? 'done' : i === ds.picksDone ? 'current' : ''; return `<div class="draft-pip ${cls}"></div>`; }).join('');
      const hp = p.hand.length > 0 ? p.hand.map(c => `<span class="draft-hand-tag">${c.icon} ${c.name}</span>`).join('') : `<span style="font-size:.75rem;color:var(--t3)">まだ引いていません</span>`;
      let ca = '';
      if (!ds.revealed) { ca = `<div class="gacha-mystery" onclick="pullDraftCard()"><div style="font-size:5rem;margin-bottom:12px">🂠</div><div style="font-size:.95rem;color:var(--t2)">山札の中身は…？</div><div style="font-size:.75rem;color:var(--t3);margin-top:6px">タップして引く</div></div><button class="btn-gacha" onclick="pullDraftCard()">🃏 山札から引く！</button>`; }
      else { const c = ds.revealed; const tc = c.type === 'policy' ? 'var(--blue)' : 'var(--red)'; ca = `<div class="gacha-card-box gacha-reveal" style="border-color:${c.type === 'policy' ? 'rgba(56,139,253,.5)' : 'rgba(248,81,73,.5)'}"><div style="font-size:3.5rem;margin-bottom:8px">${c.icon}</div><div style="font-size:.75rem;font-weight:600;color:${tc};margin-bottom:4px">${c.type === 'policy' ? '政策カード' : '災害カード'}</div><div style="font-size:1.4rem;font-weight:700;margin-bottom:6px">${c.name}</div><div style="font-size:.85rem;color:var(--t2);margin-bottom:10px">${c.desc}</div><div style="background:var(--bg0);border-radius:20px;padding:4px 14px;display:inline-block;font-size:.8rem;font-weight:700;color:${tc}">コスト ${c.cost}</div></div><button class="btn-accept" onclick="acceptDraftCard()">✅ 手札に加える</button>`; }
      return `<div class="screen active"><div class="section-title">🃏 ${p.name} — 初期手札を引いてください</div>
    <div class="draft-progress"><div><span style="font-size:.8rem;color:var(--t2)">手札 </span><strong style="color:var(--yellow)">${ds.picksDone} / ${ds.picksTarget}</strong><span style="font-size:.8rem;color:var(--t2)"> 枚</span></div><div class="draft-pips">${pips}</div></div>
    <div class="draft-hand-preview"><div style="font-size:.7rem;color:var(--t3);margin-bottom:5px">現在の手札</div><div style="display:flex;gap:6px;flex-wrap:wrap">${hp}</div></div>
    <div class="gacha-stage">${ca}</div></div>`;
    }

    // ─── 防災協定 ───
    function renderPeek() {
      const c = G.peekCard;
      return `<div class="screen active"><div style="text-align:center;padding:12px;color:var(--t2);font-size:.85rem">🔒 相手に見せないように確認してください</div>
    <div class="peek-card-display"><div class="peek-card-big"><div class="pk-icon">${c.icon}</div><div class="pk-name">${c.name}</div><div class="pk-cost">コスト: ${c.cost}</div><div class="pk-desc">${c.desc}</div></div></div>
    <div style="text-align:center;margin-top:16px"><button class="btn-ho" onclick="closePeek()" style="font-size:.9rem">確認した（閉じる）</button></div></div>`;
    }

    // ─── ターンサマリー ───
    function renderTurnSummary() {
      const events = G._turnSummary || []; const p = G.players[G.activePlayer];
      const items = events.map(ev => {
        if (ev.type === 'damage') {
          if (ev.damage === 0) { const dl = (ev.details && ev.details.length) ? ev.details.map(d => `<div class="ts-ev-subline">${d}</div>`).join('') : ''; return `<div class="ts-ev heal"><div class="ts-ev-title">🛡️ ${ev.cardIcon} ${ev.cardName} — 完全防御！</div>${dl}<div class="ts-ev-detail">基礎ダメージ ${ev.baseDamage || '?'} → 最終ダメージ 0（HP ${ev.hpBefore} のまま）</div></div>`; }
          const dl = (ev.details && ev.details.length) ? ev.details.map(d => `<div class="ts-ev-subline">${d}</div>`).join('') : '';
          let hl = ''; if (ev.healAmount > 0) hl = `<div class="ts-ev-subline" style="color:var(--green)">💚 「${ev.healCardName}」で +${ev.healAmount} 回復（HP ${ev.hpAfterDamage} → ${ev.hpAfter}）</div>`;
          return `<div class="ts-ev damage"><div class="ts-ev-title">💥 ${ev.cardIcon} ${ev.cardName} — ${ev.damage} ダメージ</div><div class="ts-ev-subline" style="color:var(--t2)">基礎ダメージ：${ev.baseDamage || '?'}</div>${dl}<div class="ts-ev-detail">最終ダメージ ${ev.damage}（HP ${ev.hpBefore} → ${ev.hpAfterDamage}）</div>${hl}</div>`;
        }
        if (ev.type === 'disaster_agency_remaining') { if (ev.remaining === 0) return `<div class="ts-ev warn"><div class="ts-ev-title">🏛️ 防災庁設置の効果が終了しました</div><div class="ts-ev-detail">次の攻撃からは全ダメージ −20 の軽減はありません</div></div>`; return `<div class="ts-ev warn"><div class="ts-ev-title">🏛️ 防災庁設置：残り ${ev.remaining} 回</div><div class="ts-ev-detail">あと ${ev.remaining} 回の被攻撃まで全ダメージ −20</div></div>`; }
        if (ev.type === 'ability_disabled_set') return `<div class="ts-ev warn" style="border-color:var(--red)"><div class="ts-ev-title">⚡ 複合災害：都市能力が無効化されました</div><div class="ts-ev-detail">次の被攻撃1回、${ev.cityName ? `「${ev.cityName}」` : 'あなたの都市'}の能力が発動しません</div></div>`;
        if (ev.type === 'opp_regen') return `<div class="ts-ev heal"><div class="ts-ev-title">💚 ${ev.cityIcon} ${ev.cityName}：HP +${ev.amount} 回復</div><div class="ts-ev-detail">HP ${ev.hpBefore} → ${ev.hpAfter}</div></div>`;
        if (ev.type === 'flood_budget') return `<div class="ts-ev budget"><div class="ts-ev-title">💧 ${ev.cityIcon} ${ev.cityName}：今ターン予算 +1</div><div class="ts-ev-detail">洪水・津波後の復旧ボーナス（このターン有効）</div></div>`;
        if (ev.type === 'typhoon_discard') return `<div class="ts-ev typhoon"><div class="ts-ev-title">🌀 台風の特殊効果（前ターン）</div><div class="ts-ev-detail">${ev.cardIcon} 「${ev.cardName}」が捨て札になりました</div></div>`;
        return '';
      }).join('');
      return `<div class="screen active"><div class="turn-summary-box">
    <div class="ts-title">📋 ${p.name}のターン — 前ターンの状況確認</div>
    <div class="ts-events">${items || '<div style="color:var(--t3);font-size:.85rem">特記なし</div>'}</div>
    <div style="text-align:center;margin-top:12px"><button class="btn-ho" onclick="dismissTurnSummary()">✅ 確認してターン開始</button></div>
  </div></div>`;
    }

    // ─── ゲームオーバー ───
    function renderGameOver() {
      const w = G.players[G.winner]; const li = G.winner === 0 ? 1 : 0; const l = G.players[li];
      const wc = w.cities.map((c, i) => `${c.icon}${c.name}(${Math.max(0, w.cityHps[i])}HP)`).join('・');
      const lc = l.cities.map((c, i) => `${c.icon}${c.name}(${Math.max(0, l.cityHps[i])}HP)`).join('・');
      return `<div class="screen active"><div class="gameover-box">
    <div class="go-icon">🏆</div><h2>${w.name} の勝利！</h2><p>${l.name}の都市がすべて壊滅しました。</p>
    <div style="margin:12px 0;padding:12px;background:var(--bg2);border-radius:10px;max-width:440px;font-size:.8rem;color:var(--t2);line-height:2">🏙️ ${w.name}：${wc}<br>💥 ${l.name}：${lc}</div>
    <button class="btn-replay" onclick="restartGame()">もう一度遊ぶ</button>
  </div></div>`;
    }

    // ═══════════════════════════════════════
    // EVENT HANDLERS
    // ═══════════════════════════════════════
    function handleHostClick() { const name = lobbyState.nameInput.trim(); if (!name) { lobbyState.error = '名前を入力してください'; render(); return; } lobbyState.error = ''; createRoom(); }
    function handleJoinClick() { const name = lobbyState.nameInput.trim(); const code = lobbyState.joinCodeInput.trim(); if (!name) { lobbyState.error = '名前を入力してください'; render(); return; } if (code.length !== 6) { lobbyState.error = 'ルームコードは6文字で入力してください'; render(); return; } lobbyState.error = ''; joinRoom(); }
    function dismissTurnSummary() { G._turnSummary = null; setupTurnDraw(G.activePlayer); pushState(); render(); }
    function requestConfirm(fn, uid, name, icon, cardType, actionLabel, danger = false) { G.confirm = { fn, uid, name, icon, cardType, actionLabel, danger }; render(); }
    function doConfirm() { const c = G.confirm; G.confirm = null; if (c.fn === 'playCard') playCard(c.uid); else if (c.fn === 'playResponseCard') playResponseCard(c.uid); else if (c.fn === 'discardCard') discardCard(c.uid); }
    function cancelConfirm() { G.confirm = null; render(); }

    function playCard(uid) {
      const p = G.players[G.activePlayer]; const idx = p.hand.findIndex(c => c.uid === uid); if (idx === -1) return; const card = p.hand[idx];
      if (G.activePlayer === 0 && G.turnsEach[0] === 0 && card.type === 'disaster') { alert('先攻1ターン目は災害カードを使えません。'); return; }
      if (getBudgetLeft(G.activePlayer) < card.cost) return;
      p.hand.splice(idx, 1); G.discard.push(card); p.budgetUsed += card.cost;
      showBudgetToast(card.cost, getBudgetLeft(G.activePlayer), getBudget(G.activePlayer));
      if (card.type === 'policy') {
        applyPolicyEffect(card, G.activePlayer, false);
        if (G.screen === 'peek') { pushState(); render(); return; }
        if (G.screen === 'turnDraw') { pushState(); render(); return; }
        if (!handleDiscardIfNeeded(G.activePlayer, 'main')) goMain();
      } else {
        const defIdx = G.activePlayer === 0 ? 1 : 0; G.pendingAttack = { card, attackerIdx: G.activePlayer, defenderIdx: defIdx };
        addLog(`⚔️ ${p.name}が「${card.icon} ${card.name}」を宣言！`, 'sys'); pushState(); render();
      }
    }

    function goResponseHandover() { G.screen = 'response'; pushState(); render(); }

    function skipResponse() {
      resolveDamage(G.pendingAttack.card, G.pendingAttack.defenderIdx, null); G.pendingAttack = null;
      if (checkWin()) return; G.screen = 'main'; pushState(); render();
    }

    function playResponseCard(uid) {
      const defIdx = G.pendingAttack.defenderIdx; const def = G.players[defIdx];
      const idx = def.hand.findIndex(c => c.uid === uid); if (idx === -1) return; const card = def.hand[idx]; if (card.type !== 'policy') return;
      def.hand.splice(idx, 1); G.discard.push(card); addLog(`🛡️ ${def.name}が「${card.icon} ${card.name}」で対応！`, 'policy');
      resolveDamage(G.pendingAttack.card, defIdx, card); G.pendingAttack = null;
      if (checkWin()) return; G.screen = 'main'; pushState(); render();
    }

    function discardCard(uid) {
      const dn = G.discardNeeded; const pi = dn.pi ?? dn.playerIdx; const p = G.players[pi];
      const idx = p.hand.findIndex(c => c.uid === uid); if (idx === -1) return;
      const card = p.hand.splice(idx, 1)[0]; G.discard.push(card); addLog(`📤 ${p.name}がカードを1枚捨てた`, 'sys');
      if (p.hand.length <= 5) { G.discardNeeded = null; G.screen = dn.returnTo; }
      pushState(); render();
    }

    function closePeek() { G.peekCard = null; G.screen = 'main'; pushState(); render(); }

    function restartGame() {
      if (db && roomId && myRole === 'p1') db.ref(`rooms/${roomId}`).remove();
      myRole = null; myPlayerIdx = 0; roomId = null; myLastPush = null;
      lobbyState = { mode: 'select', nameInput: '', joinCodeInput: '', error: '' };
      G = { screen: 'lobby', activePlayer: 0, turnsEach: [0, 0], players: [{ name: 'プレイヤー1', cities: [], cityHps: [], activeCityIdx: 0, hand: [], budgetUsed: 0, effects: mkEffects() }, { name: 'プレイヤー2', cities: [], cityHps: [], activeCityIdx: 0, hand: [], budgetUsed: 0, effects: mkEffects() }], deck: [], discard: [], log: [], pendingAttack: null, peekCard: null, winner: null, gachaPickedIds: [], gachaCurrent: null, draftState: null, discardNeeded: null, confirm: null, turnDrawState: null, _nextTurnEvents: { 0: [], 1: [] }, _turnSummary: null };
      render();
    }

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam) { lobbyState.joinCodeInput = roomParam.toUpperCase().slice(0, 6); lobbyState.mode = 'join'; }
      if (isFirebaseConfigured()) initFirebase();
      render();
    });
  </script>
</body>

</html>
