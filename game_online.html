    // ═══════════════════════════════════════
    // DAMAGE RESOLUTION
    // ═══════════════════════════════════════
    function resolveDamage(attackCard, defIdx, responseCard) {
      const def = G.players[defIdx]; const defCity = getActiveCity(defIdx);
      const fromHp = def.cityHps[def.activeCityIdx]; let dmg = attackCard.baseDamage; const log = [];
      // 構造化ログヘルパー：cat=カテゴリ, text=説明文, delta=ダメージ変化量（nullなら非ダメージ効果）
      const ld = (cat, text, delta) => log.push({ cat, text, delta: delta ?? null, running: delta != null ? dmg : null });
      // 特殊効果キャンセル
      let specialNegated = false;
      if (def.effects.negateSpecial) { specialNegated = true; def.effects.negateSpecial = false; dmg -= 10; ld('negate', '広域避難指示（事前設置）：特殊効果を無効化 −10', -10); }
      if (!specialNegated && responseCard && responseCard.effectType === 'negate_special') { specialNegated = true; dmg -= 10; ld('negate', '広域避難指示（対応フェーズ）：特殊効果を無効化 −10', -10); }
      // 特殊効果適用
      if (!specialNegated && attackCard.specialType) {
        if (attackCard.specialType === 'coastal_bonus' && defCity && defCity.isCoastal) { dmg += 10; ld('exposure', '海岸都市（地形リスク：洪水・津波への曝露）', +10); }
        if (attackCard.specialType === 'mountain_bonus' && defCity && defCity.isMountain) { dmg += 10; ld('exposure', '山間部都市（地形リスク：土砂崩れへの曝露）', +10); }
        if (attackCard.specialType === 'inland_bonus' && defCity && !defCity.isCoastal && !defCity.isMountain) { dmg += 10; ld('exposure', '内陸都市（地形リスク：地震への曝露）', +10); }
        if (attackCard.specialType === 'discard_policy') {
          const pols = def.hand.filter(c => c.type === 'policy');
          if (pols.length > 0) { const d = pols[Math.random() * pols.length | 0]; def.hand.splice(def.hand.indexOf(d), 1); G.discard.push(d); ld('special', `台風：${def.name}の政策カード1枚を破棄`, null); G._nextTurnEvents[defIdx].push({ type: 'typhoon_discard', cardIcon: d.icon, cardName: d.name }); }
          else ld('special', '台風：政策カードなし（効果なし）', null);
        }
      }
      // 都市能力
      if (defCity) {
        if (defCity.abilityType === 'resist_compound' && attackCard.id === 'compound') { dmg -= defCity.abilityValue; ld('city_policy', `${defCity.name}の都市対策：複合災害軽減（防災投資）`, -defCity.abilityValue); }
        if (defCity.abilityType === 'resist_quake_fire' && (attackCard.id === 'earthquake' || attackCard.id === 'wildfire')) { dmg -= defCity.abilityValue; ld('city_policy', `${defCity.name}の都市対策：地震・大火災軽減（防災投資）`, -defCity.abilityValue); }
        if (defCity.abilityType === 'resist_landslide' && attackCard.id === 'landslide') { dmg -= defCity.abilityValue; ld('city_policy', `${defCity.name}の都市対策：土砂崩れ軽減（防災投資）`, -defCity.abilityValue); }
        if (defCity.abilityType === 'resist_flood' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { dmg -= defCity.abilityValue; ld('city_policy', `${defCity.name}の都市対策：洪水・津波軽減（防災投資）`, -defCity.abilityValue); }
        if (defCity.abilityType === 'second_hit_reduce' && def.effects.disastersReceivedThisTurn >= 1) { dmg -= defCity.abilityValue; ld('city_policy', `${defCity.name}の都市対策：連続被弾軽減（適応力）`, -defCity.abilityValue); }
        if (defCity.abilityType === 'quake_regen' && attackCard.id === 'earthquake') def.effects.quakeHitThisTurn = true;
        if (defCity.abilityType === 'flood_budget' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { def.effects.floodBonusTurns = 1; ld('city_effect', `${defCity.name}の都市能力：次ターン予算+1（洪水後の復旧）`, null); }
        if (defCity.abilityType === 'flood_draw' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { drawCards(defIdx, defCity.abilityValue); autoDiscard(defIdx); ld('city_effect', `${defCity.name}の都市能力：${defCity.abilityValue}枚ドロー（被災後の学習）`, null); }
        if (defCity.abilityType === 'quake_draw' && attackCard.id === 'earthquake') { drawCards(defIdx, defCity.abilityValue); autoDiscard(defIdx); ld('city_effect', `${defCity.name}の都市能力：${defCity.abilityValue}枚ドロー（被災後の学習）`, null); }
      }
      def.effects.disastersReceivedThisTurn++;
      // 防災庁
      if (def.effects.damageReduceHits > 0) { dmg -= 15; def.effects.damageReduceHits--; ld('agency', `防災庁設置：全ダメージ軽減（残${def.effects.damageReduceHits}回）`, -15); G._nextTurnEvents[defIdx].push({ type: 'disaster_agency_remaining', remaining: def.effects.damageReduceHits }); }
      // シールド（事前）
      if (def.effects.shieldQuakeFire && (attackCard.id === 'earthquake' || attackCard.id === 'wildfire')) { dmg -= 30; def.effects.shieldQuakeFire = false; ld('shield_pre', '耐震補強（事前設置）：発動・消費', -30); }
      if (def.effects.shieldFlood && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { dmg -= 25; def.effects.shieldFlood = false; ld('shield_pre', '堤防建設（事前設置）：発動・消費', -25); }
      // 対応カード
      if (responseCard && responseCard.effectType !== 'negate_special' && responseCard.effectType !== 'heal') {
        applyPolicyEffect(responseCard, defIdx, true);
        if (responseCard.effectType === 'shield_quake_fire' && (attackCard.id === 'earthquake' || attackCard.id === 'wildfire')) { dmg -= 30; def.effects.shieldQuakeFire = false; ld('shield_resp', '耐震補強（対応フェーズ）：発動・消費', -30); }
        if (responseCard.effectType === 'shield_flood' && (attackCard.id === 'flood' || attackCard.id === 'tsunami')) { dmg -= 25; def.effects.shieldFlood = false; ld('shield_resp', '堤防建設（対応フェーズ）：発動・消費', -25); }
      }
      // ニューオーリンズ
      if (defCity && defCity.abilityType === 'vulnerability_draw' && def.hand.length <= 2) {
        dmg += defCity.abilityValue; ld('vuln', `ニューオーリンズ（社会的脆弱性：手札${def.hand.length}枚）`, +defCity.abilityValue);
        drawCards(defIdx, 1); autoDiscard(defIdx); ld('city_effect', 'ニューオーリンズの底力：コミュニティ1枚ドロー', null);
      }
      // ダメージ確定
      dmg = Math.max(0, dmg); def.cityHps[def.activeCityIdx] -= dmg;
      let finalHp = def.cityHps[def.activeCityIdx]; const hpAD = finalHp;
      // 回復（対応カード）
      let healLog = null; let healAmt = 0; let healName = null;
      if (responseCard && responseCard.effectType === 'heal') {
        const healVal = Math.floor(responseCard.value / 2); // 対応フェーズでは回復半減
        if (finalHp > 0) { const mxHp = getActiveMaxHp(defIdx); const bh = finalHp; finalHp = Math.min(finalHp + healVal, mxHp); def.cityHps[def.activeCityIdx] = finalHp; healAmt = finalHp - bh; healName = responseCard.name; healLog = { type: 'heal', msg: `💚 ${def.name}「${responseCard.name}」→ HP +${healAmt}（${bh} → ${finalHp}）【対応時半減】` }; }
        else healLog = { type: 'sys', msg: `💔 ${def.name}：都市壊滅のため「${responseCard.name}」の回復は無効` };
      }
      if (fromHp !== finalHp) queueHpAnim(defIdx, fromHp, finalHp);
      const aN = G.players[G.pendingAttack.attackerIdx].name;
      addLog(`💥 ${aN}が「${attackCard.name}」→ ${dmg}ダメージ（${def.name}残HP:${Math.max(0, finalHp)}）`, 'dmg');
      for (const l of log) addLog(l.delta != null ? `→ ${l.text}（${l.delta > 0 ? '+' : ''}${l.delta}）` : `→ ${l.text}`);
      if (healLog) addLog(healLog.msg, healLog.type);
      G._nextTurnEvents[defIdx].push({ type: 'damage', cardIcon: attackCard.icon, cardName: attackCard.name, baseDamage: attackCard.baseDamage, details: [...log], damage: dmg, hpBefore: fromHp, hpAfterDamage: Math.max(0, hpAD), hpAfter: Math.max(0, finalHp), healAmount: healAmt, healCardName: healName });
    }

    // ═══════════════════════════════════════
    // POLICY EFFECTS
    // ═══════════════════════════════════════
    function applyPolicyEffect(card, pi, asResponse) {
      const p = G.players[pi];
      switch (card.effectType) {
        case 'shield_quake_fire': p.effects.shieldQuakeFire = true; if (!asResponse) addLog(`🔵 ${p.name}「${card.name}」→ 地震・大火災シールド`, 'policy'); break;
        case 'shield_flood': p.effects.shieldFlood = true; if (!asResponse) addLog(`🔵 ${p.name}「${card.name}」→ 洪水・津波シールド`, 'policy'); break;
        case 'heal': { const mxHp = getActiveMaxHp(pi); const fh = p.cityHps[p.activeCityIdx]; p.cityHps[p.activeCityIdx] = Math.min(p.cityHps[p.activeCityIdx] + card.value, mxHp); queueHpAnim(pi, fh, p.cityHps[p.activeCityIdx]); addLog(`💚 ${p.name}「${card.name}」→ HP +${card.value}（現在:${p.cityHps[p.activeCityIdx]}）`, 'heal'); break; }
        case 'draw': G.turnDrawState = { pi, drawn: 0, target: card.value, revealed: null, isHazardMap: true }; G.screen = 'turnDraw'; addLog(`🗺️ ${p.name}「${card.name}」→ ${card.value}枚ドロー中…`, 'policy'); break;
        case 'negate_special': p.effects.negateSpecial = true; addLog(`🔵 ${p.name}「${card.name}」→ 次の特殊効果を無効化＋ダメージ−10`, 'policy'); break;
        case 'damage_reduce_2t': p.effects.damageReduceHits = 2; addLog(`🔵 ${p.name}「${card.name}」→ 全ダメージ −15（次2回）`, 'policy'); break;
        case 'peek_all': { const opp = G.players[pi === 0 ? 1 : 0]; if (opp.hand.length > 0) { G.peekCards = opp.hand.slice(); G.peekByPlayerIdx = pi; addLog(`🔵 ${p.name}「${card.name}」→ 相手の手札を全公開`, 'policy'); G.screen = 'peek'; } else addLog(`🔵 ${p.name}「${card.name}」→ 相手の手札なし`, 'policy'); break; }
      }
    }

    // ═══════════════════════════════════════
    // TURN MANAGEMENT (online: handoverなし)
    // ═══════════════════════════════════════
    function setupTurnDraw(pi) {
      const p = G.players[pi]; p.budgetUsed = 0; p.effects.disastersReceivedThisTurn = 0;
      if (p.effects.floodBonusTurns > 0) p.effects.floodBonusTurns--;
      const target = Math.min(2, Math.max(0, 5 - p.hand.length));
      if (target === 0) { addLog(`─── ${p.name}のターン開始（予算${getBudget(pi)}・手札満杯のためドローなし）`, 'sys'); G.screen = 'main'; }
      else { G.turnDrawState = { pi, drawn: 0, target, revealed: null }; G.screen = 'turnDraw'; }
    }

    function endTurn() {
      const p = G.players[G.activePlayer]; const city = getActiveCity(G.activePlayer);
      if (city && city.abilityType === 'regen') { const mxHp = city.hp; const fh = p.cityHps[p.activeCityIdx]; p.cityHps[p.activeCityIdx] = Math.min(p.cityHps[p.activeCityIdx] + city.abilityValue, mxHp); if (p.cityHps[p.activeCityIdx] !== fh) queueHpAnim(G.activePlayer, fh, p.cityHps[p.activeCityIdx]); addLog(`💚 ${city.name}の回復能力 +${city.abilityValue}（HP:${p.cityHps[p.activeCityIdx]}）`, 'heal'); const opp = G.activePlayer === 0 ? 1 : 0; G._nextTurnEvents[opp].push({ type: 'opp_regen', cityIcon: city.icon, cityName: city.name, amount: city.abilityValue, hpBefore: fh, hpAfter: p.cityHps[p.activeCityIdx] }); }
      if (city && city.abilityType === 'quake_regen' && p.effects.quakeHitThisTurn) { const fh = p.cityHps[p.activeCityIdx]; p.cityHps[p.activeCityIdx] = Math.min(p.cityHps[p.activeCityIdx] + city.abilityValue, city.hp); if (p.cityHps[p.activeCityIdx] !== fh) queueHpAnim(G.activePlayer, fh, p.cityHps[p.activeCityIdx]); addLog(`💚 ${city.name}の能力（地震後回復）+${city.abilityValue}`, 'heal'); const opp = G.activePlayer === 0 ? 1 : 0; G._nextTurnEvents[opp].push({ type: 'opp_regen', cityIcon: city.icon, cityName: city.name, amount: city.abilityValue, hpBefore: fh, hpAfter: p.cityHps[p.activeCityIdx] }); }
      p.effects.quakeHitThisTurn = false;
      G.turnsEach[G.activePlayer]++; const next = G.activePlayer === 0 ? 1 : 0; G.activePlayer = next;
      const evts = G._nextTurnEvents[next];
      if (evts.length > 0) { G._turnSummary = [...evts]; G._nextTurnEvents[next] = []; G.screen = 'turnSummary'; }
      else setupTurnDraw(next);
      pushState(); render();
    }

    // ═══════════════════════════════════════
    // GACHA / DRAFT
    // ═══════════════════════════════════════
    function pullGacha() { const rem = CITIES.filter(c => !G.gachaPickedIds.includes(c.id)); G.gachaCurrent.revealed = rem[Math.random() * rem.length | 0]; pushState(); render(); }

    function acceptGachaCity() {
      const gc = G.gachaCurrent; const city = gc.revealed; const p = G.players[gc.playerIdx];
      p.cities.push(city); p.cityHps.push(city.hp); G.gachaPickedIds.push(city.id);
      if (gc.pickNum === 0) { gc.pickNum = 1; gc.revealed = null; pushState(); render(); }
      else { G.screen = 'cityOrder'; G.cityOrderState = { playerIdx: gc.playerIdx }; pushState(); render(); }
    }

    function selectCityOrder(playerIdx, firstIdx) {
      const p = G.players[playerIdx];
      if (firstIdx === 1) { [p.cities[0], p.cities[1]] = [p.cities[1], p.cities[0]]; [p.cityHps[0], p.cityHps[1]] = [p.cityHps[1], p.cityHps[0]]; }
      if (playerIdx === 0) { G.gachaCurrent = { playerIdx: 1, pickNum: 0, revealed: null }; G.screen = 'gacha'; }
      else { G.deck = createDeck(); G.discard = []; G.log = []; G.turnsEach = [0, 0]; G.activePlayer = 0; G.players.forEach(p => { p.hand = []; p.budgetUsed = 0; p.effects = mkEffects(); }); startDraft(0); }
      pushState(); render();
    }

    function renderCityOrderSelect() {
      const pi = G.cityOrderState?.playerIdx ?? 0; const p = G.players[pi];
      const c0 = p.cities[0], c1 = p.cities[1];
      function cityCard(c, idx) {
        return `<div class="gacha-card-box" onclick="selectCityOrder(${pi},${idx})" style="cursor:pointer;width:200px;transition:.2s" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform=''">
        <img class="cityorder-city-img" src="images/cities/${c.id}.webp" alt="" onerror="this.style.display='none'">
        <div style="font-size:2.5rem">${c.icon}</div>
        <div style="font-weight:700;font-size:1rem;margin:6px 0">${c.name}</div>
        <div class="terrain-badge">(${c.isCoastal ? '海岸' : c.isMountain ? '山間部' : '内陸'})</div>
        <div style="font-size:.8rem;color:var(--t2);margin-top:6px">HP ${c.hp}</div>
        <div style="font-size:.75rem;color:var(--t2);margin-top:4px;line-height:1.4">${c.abilityDesc}</div>
        <div style="margin-top:10px;padding:6px;background:rgba(56,139,253,.15);border-radius:6px;color:var(--blue);font-size:.8rem;font-weight:600">先攻に選ぶ</div>
      </div>`;
      }
      return `<div class="screen active"><div class="gacha-stage">
      <div style="text-align:center;margin-bottom:12px"><div class="section-title">🏙️ 戦闘順の選択</div><div style="color:var(--t2);font-size:.85rem;margin-top:4px">${p.name} — どちらの都市を先に戦わせますか？</div></div>
      <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap">${cityCard(c0, 0)}${cityCard(c1, 1)}</div>
      <div style="color:var(--t3);font-size:.75rem;margin-top:12px;text-align:center">先に選んだ都市が最初に戦います。壊滅後に残りの都市が登場します。</div>
    </div></div>`;
    }

    function startDraft(pi) { G.draftState = { playerIdx: pi, picksDone: 0, picksTarget: 4, revealed: null, needPolicy: 2, needDisaster: 2 }; G.screen = 'draft'; }

    function pullDraftCard() {
      const ds = G.draftState; const needP = ds.needPolicy, needD = ds.needDisaster; let pool;
      if (needP > 0 && needD > 0) pool = G.deck.filter(c => c.type === 'policy' || c.type === 'disaster');
      else if (needP > 0) pool = G.deck.filter(c => c.type === 'policy');
      else if (needD > 0) pool = G.deck.filter(c => c.type === 'disaster');
      else pool = [...G.deck];
      if (pool.length === 0) { if (G.discard.length === 0) return; G.deck = shuffle([...G.discard, ...G.deck]); G.discard = []; pullDraftCard(); return; }
      const card = pool[Math.random() * pool.length | 0]; G.deck.splice(G.deck.indexOf(card), 1); ds.revealed = card; pushState(); render();
    }

    function acceptDraftCard() {
      const ds = G.draftState; if (!ds.revealed) return;
      if (ds.revealed.type === 'policy' && ds.needPolicy > 0) ds.needPolicy--;
      else if (ds.revealed.type === 'disaster' && ds.needDisaster > 0) ds.needDisaster--;
      G.players[ds.playerIdx].hand.push(ds.revealed); ds.revealed = null; ds.picksDone++;
      if (ds.picksDone >= ds.picksTarget) {
        if (ds.playerIdx === 0) { startDraft(1); pushState(); render(); }
        else { G.activePlayer = 0; G.players[0].budgetUsed = 0; addLog(`─── ${G.players[0].name}のターン開始（予算${getBudget(0)}）`, 'sys'); G.screen = 'main'; pushState(); render(); }
      } else { G.screen = 'draft'; pushState(); render(); }
    }

    function pullTurnCard() {
      const ts = G.turnDrawState; if (ts.revealed) return;
      if (G.deck.length === 0) { if (G.discard.length === 0) return; G.deck = shuffle([...G.discard]); G.discard = []; addLog('山札をシャッフルしました', 'sys'); }
      ts.revealed = G.deck.shift(); pushState(); render();
    }

    function acceptTurnCard() {
      const ts = G.turnDrawState; if (!ts.revealed) return;
      const pi = ts.pi ?? ts.playerIdx;
      G.players[pi].hand.push(ts.revealed); ts.drawn++; ts.revealed = null;
      if (ts.drawn >= ts.target) {
        G.turnDrawState = null;
        if (ts.isHazardMap) addLog(`🗺️ ${G.players[pi].name}：ハザードマップ整備で${ts.target}枚ドロー完了`, 'policy');
        else addLog(`─── ${G.players[pi].name}のターン開始（予算${getBudget(pi)}・${ts.target}枚ドロー）`, 'sys');
        if (!handleDiscardIfNeeded(pi, 'main')) goMain();
      } else { pushState(); render(); }
    }

    // ═══════════════════════════════════════
    // HP ANIMATION & BUDGET TOAST
    // ═══════════════════════════════════════
    let _hpQ = [];
    function queueHpAnim(pi, fh, th) { _hpQ.push({ pi, fh, th }); }
    function processHpAnims() {
      if (G.screen !== 'main' && G.screen !== 'response') return; if (G._turnSummary) return;
      const q = _hpQ.splice(0); for (const a of q) _animateHp(a.pi, a.fh, a.th);
    }
    function _animateHp(pi, fh, th) {
      const mxHp = getActiveMaxHp(pi); const fill = document.getElementById('hp-fill-' + pi); const text = document.getElementById('hp-text-' + pi);
      if (!fill || !text) return;
      fill.style.transition = 'none'; fill.style.width = Math.max(0, fh / mxHp * 100) + '%'; fill.style.background = hpColor(fh, mxHp); fill.offsetWidth;
      fill.style.transition = 'width .6s ease, background .6s ease'; fill.style.width = Math.max(0, th / mxHp * 100) + '%'; fill.style.background = hpColor(th, mxHp);
      text.style.color = hpColor(th, mxHp); text.textContent = Math.max(0, th) + '/' + mxHp;
    }
    function showBudgetToast(cost, rem, tot) {
      setTimeout(() => { const t = document.createElement('div'); t.className = 'budget-toast'; t.innerHTML = `<span style="color:var(--yellow)">−${cost}pt</span> 使用　残り <strong style="color:var(--green)">${rem}</strong><span style="color:var(--t2)">/${tot}</span>`; const a = document.getElementById('app'); if (a) a.appendChild(t); setTimeout(() => t.remove(), 1800); }, 0);
    }

    // ═══════════════════════════════════════
    // FIREBASE
    // ═══════════════════════════════════════
    function isFirebaseConfigured() { return FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY'; }
    function initFirebase() { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }

    function generateRoomCode() { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c = ''; for (let i = 0; i < 6; i++)c += chars[Math.random() * chars.length | 0]; return c; }

    function pushState() {
      if (!db || !roomId) return;
      const s = JSON.stringify({ ...G, confirm: null }); myLastPush = s;
      db.ref(`rooms/${roomId}/state`).set(s);
    }

    function listenToState() {
      db.ref(`rooms/${roomId}/state`).on('value', snap => {
        const data = snap.val(); if (!data || data === myLastPush) return;
        G = { ...JSON.parse(data), confirm: null }; render(); processHpAnims();
      });
    }

    async function createRoom() {
      const name = lobbyState.nameInput.trim();
      if (!name) { lobbyState.error = '名前を入力してください'; render(); return; }
      myRole = 'p1'; myPlayerIdx = 0; roomId = generateRoomCode(); G.players[0].name = name;
      try {
        await db.ref(`rooms/${roomId}`).set({ p1Name: name, p2Name: '', p2Joined: false, state: null });
        db.ref(`rooms/${roomId}/p2Joined`).on('value', snap => {
          if (snap.val() === true) {
            db.ref(`rooms/${roomId}/p2Joined`).off();
            db.ref(`rooms/${roomId}/p2Name`).get().then(s2 => {
              G.players[1].name = s2.val() || 'プレイヤー2';
              listenToState();
              G.gachaPickedIds = []; G.gachaCurrent = { playerIdx: 0, pickNum: 0, revealed: null }; G.screen = 'gacha';
              pushState(); render();
            });
          }
        });
        G.screen = 'waiting_connection'; render();
      } catch (e) { lobbyState.error = 'ルーム作成に失敗: ' + e.message; render(); }
    }

    async function joinRoom() {
      const name = lobbyState.nameInput.trim(); const code = lobbyState.joinCodeInput.trim().toUpperCase();
      if (!name) { lobbyState.error = '名前を入力してください'; render(); return; }
      if (code.length !== 6) { lobbyState.error = 'ルームコードは6文字です'; render(); return; }
      try {
        const snap = await db.ref(`rooms/${code}`).get();
        if (!snap.val()) { lobbyState.error = 'ルームが見つかりません'; render(); return; }
        if (snap.val().p2Joined) { lobbyState.error = 'このルームはすでに満員です'; render(); return; }
        myRole = 'p2'; myPlayerIdx = 1; roomId = code; G.players[1].name = name;
        await db.ref(`rooms/${roomId}/p2Name`).set(name);
        await db.ref(`rooms/${roomId}/p2Joined`).set(true);
        listenToState(); G.screen = 'waiting_connection'; render();
      } catch (e) { lobbyState.error = '参加に失敗: ' + e.message; render(); }
    }

    function generateQR() {
      const el = document.getElementById('qr-container'); if (!el || el.dataset.generated) return; el.dataset.generated = 'true';
      const base = window.location.href.split('?')[0];
      const url = `${base}?room=${roomId}`;
      try { new QRCode(el, { text: url, width: 150, height: 150, colorDark: '#e6edf3', colorLight: '#0d1117' }); }
      catch (e) { el.innerHTML = `<div style="color:var(--t3);font-size:.75rem;padding:8px">QR生成失敗</div>`; }
    }

    // ═══════════════════════════════════════
    // VIEW DISPATCH
    // ═══════════════════════════════════════
    function myView() {
      if (!isFirebaseConfigured()) return 'setup_required';
      if (G.screen === 'lobby' || G.screen === 'waiting_connection') return G.screen;
      const mi = myPlayerIdx;
      switch (G.screen) {
        case 'cityOrder': return G.cityOrderState?.playerIdx === mi ? 'cityOrder' : 'waiting';
        case 'gacha': return G.gachaCurrent?.playerIdx === mi ? 'gacha' : 'waiting';
        case 'draft': return G.draftState?.playerIdx === mi ? 'draft' : 'waiting';
        case 'turnDraw': { const pi = G.turnDrawState?.pi ?? G.turnDrawState?.playerIdx; return pi === mi ? 'turnDraw' : 'waiting'; }
        case 'turnSummary': return G.activePlayer === mi ? 'turnSummary' : 'waiting';
        case 'main':
          if (G.pendingAttack) { if (G.pendingAttack.attackerIdx === mi) return 'main'; if (G.pendingAttack.defenderIdx === mi) return 'waiting_response'; }
          return G.activePlayer === mi ? 'main' : 'waiting';
        case 'response': return G.pendingAttack?.defenderIdx === mi ? 'response' : 'waiting';
        case 'discard': { const pi = G.discardNeeded?.pi ?? G.discardNeeded?.playerIdx; return pi === mi ? 'discard' : 'waiting'; }
        case 'peek': return (G.peekByPlayerIdx ?? G.activePlayer) === mi ? 'peek' : 'waiting';
        case 'gameover': return 'gameover';
        default: return 'waiting';
      }
    }

    // ═══════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════
    function render() {
      const app = document.getElementById('app'); const view = myView(); let html = '';
      switch (view) {
        case 'setup_required': html = renderSetupRequired(); break;
        case 'lobby': html = renderLobby(); break;
        case 'waiting_connection': html = renderWaitingConnection(); break;
        case 'cityOrder': html = renderCityOrderSelect(); break;
        case 'gacha': html = renderGacha(); break;
        case 'draft': html = renderDraft(); break;
        case 'turnDraw': html = renderTurnDraw(); break;
        case 'turnSummary': html = renderTurnSummary(); break;
        case 'main': html = renderMain(false); break;
        case 'response': html = renderMain(true); break;
        case 'waiting_response': html = renderWaitingResponse(); break;
        case 'discard': html = renderDiscard(); break;
        case 'peek': html = renderPeek(); break;
        case 'gameover': html = renderGameOver(); break;
        case 'waiting': html = renderWaiting(); break;
      }
      if (G.confirm && (view === 'main' || view === 'response' || view === 'discard')) html += renderConfirmModal();
      const _cityModalViews = ['main', 'response', 'waiting', 'waiting_response'];
      if (_cityInfoModal !== null && _cityModalViews.includes(view)) html += renderCityInfoModal();
      else if (!_cityModalViews.includes(view)) _cityInfoModal = null;
      app.innerHTML = html; processHpAnims();
      if (view === 'waiting_connection' && myRole === 'p1') setTimeout(generateQR, 80);
    }

    // ─── セットアップ必須 ───
    function renderSetupRequired() {
      return `<div class="screen active"><div class="setup-box">
    <div style="text-align:center;margin-bottom:20px"><div style="font-size:2.5rem">🔧</div><h2 style="color:var(--yellow);margin:8px 0">Firebase 設定が必要です</h2><p style="color:var(--t2);font-size:.85rem">このページを使うには Firebase Realtime Database の設定が必要です。</p></div>
    <div class="setup-step"><span class="setup-num">1</span><div><strong>Firebaseプロジェクト作成</strong><br><a href="https://console.firebase.google.com" target="_blank" style="color:var(--blue)">console.firebase.google.com</a> で無料プロジェクトを作成（Googleアカウント必要）</div></div>
    <div class="setup-step"><span class="setup-num">2</span><div><strong>Realtime Database を有効化</strong><br>「構築」→「Realtime Database」→「データベースを作成」→テストモードで開始</div></div>
    <div class="setup-step"><span class="setup-num">3</span><div><strong>設定情報をコピー</strong><br>「プロジェクトの設定」→「マイアプリ」→ Webアプリを登録 →「<code>firebaseConfig</code>」をコピー</div></div>
    <div class="setup-step"><span class="setup-num">4</span><div><strong>このファイルを編集</strong><br><code>game_online.html</code> 冒頭の <code>FIREBASE_CONFIG</code> に値を貼り付けて上書き保存</div></div>
  </div></div>`;
    }

    // ─── ロビー ───
    function openGalleryZoom(type, id, name) { lobbyState.galleryZoom = { type, id, name }; render(); }

    function renderLobby() {
      const nv = lobbyState.nameInput.replace(/"/g, '&quot;'); const jv = lobbyState.joinCodeInput.replace(/"/g, '&quot;');
      const err = lobbyState.error ? `<div class="lobby-error">⚠️ ${lobbyState.error}</div>` : '';

      // ── ギャラリーモード ──
      if (lobbyState.mode === 'gallery') {
        const tabs = [
          { key: 'city', label: '🏙️ 都市カード' },
          { key: 'policy', label: '🛡️ 政策カード' },
          { key: 'disaster', label: '⚡ 災害カード' },
        ];
        const tabHtml = tabs.map(t => `<button class="gallery-tab-btn${lobbyState.galleryTab === t.key ? ' active' : ''}" onclick="lobbyState.galleryTab='${t.key}';lobbyState.galleryZoom=null;render()">${t.label}</button>`).join('');
        let contentHtml = '';
        if (lobbyState.galleryZoom) {
          const z = lobbyState.galleryZoom;
          const src = z.type === 'city' ? `images/cities/${z.id}.webp` : `images/cards/${z.id}.webp`;
          let infoHtml = '';
          if (z.type === 'city') {
            const city = CITIES.find(c => c.id === z.id);
            if (city) {
              const attr = city.isCoastal ? '海岸都市' : city.isMountain ? '山間部都市' : '内陸都市';
              infoHtml = `<div style="font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px">${city.name}<span style="font-size:.78rem;color:var(--t2);font-weight:400;margin-left:8px">[${attr}]</span></div><div style="font-size:.83rem;color:var(--t2);line-height:1.7;background:var(--bg2);border-radius:10px;padding:12px 14px">${city.learn}</div>`;
            }
          } else {
            const card = [...POLICY_CARDS, ...DISASTER_CARDS].find(c => c.id === z.id);
            if (card) {
              if (card.type === 'policy') {
                infoHtml = `<div style="font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px">${card.name}</div><div style="font-size:.72rem;color:var(--t2);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">対応する現実概念</div><div style="font-size:.83rem;color:var(--t2);line-height:1.7;background:var(--bg2);border-radius:10px;padding:12px 14px">${card.realConcept}</div>`;
              } else {
                const colHtml = card.column
                  ? `<div style="font-size:.72rem;font-weight:700;color:var(--yellow);margin-bottom:6px;letter-spacing:.04em">コラム：${card.columnTitle}</div><div style="font-size:.83rem;color:var(--t2);line-height:1.7">${card.column}</div>`
                  : `<div style="font-size:.82rem;color:var(--t3);text-align:center;padding:8px 0">コラムなし</div>`;
                infoHtml = `<div style="font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px">${card.name}</div><div style="background:var(--bg2);border-radius:10px;padding:12px 14px">${colHtml}</div>`;
              }
            }
          }
          contentHtml = `<button class="lobby-btn-back" style="width:auto;padding:8px 16px;margin:0;align-self:flex-start" onclick="lobbyState.galleryZoom=null;render()">← 一覧に戻る</button><div style="display:flex;flex-direction:column;align-items:center;gap:14px"><img src="${src}" alt="${z.name}" style="max-height:260px;max-width:min(200px,80vw);border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.6)" onerror="this.style.opacity='.3'"><div style="width:100%;display:flex;flex-direction:column;gap:8px">${infoHtml}</div></div>`;
        } else if (lobbyState.galleryTab) {
          let gridHtml = '';
          if (lobbyState.galleryTab === 'city') {
            gridHtml = CITIES.map(c => `<div class="gallery-card" onclick="openGalleryZoom('city','${c.id}','${c.name}')"><img src="images/cities/${c.id}.webp" alt="${c.name}" loading="lazy"></div>`).join('');
          } else if (lobbyState.galleryTab === 'policy') {
            gridHtml = POLICY_CARDS.map(c => `<div class="gallery-card" onclick="openGalleryZoom('card','${c.id}','${c.name}')"><img src="images/cards/${c.id}.webp" alt="${c.name}" loading="lazy"></div>`).join('');
          } else if (lobbyState.galleryTab === 'disaster') {
            gridHtml = DISASTER_CARDS.map(c => `<div class="gallery-card" onclick="openGalleryZoom('card','${c.id}','${c.name}')"><img src="images/cards/${c.id}.webp" alt="${c.name}" loading="lazy"></div>`).join('');
          }
          contentHtml = `<div class="gallery-grid">${gridHtml}</div>`;
        } else {
          contentHtml = `<div style="text-align:center;color:var(--t3);font-size:.85rem;padding:20px 0">上のボタンでカードの種類を選んでください</div>`;
        }
        return `<div class="screen active"><div class="gallery-wrap"><div class="gallery-box">
    <div class="gallery-header"><button class="lobby-btn-back" style="width:auto;padding:8px 16px;margin:0" onclick="lobbyState.mode='select';lobbyState.galleryZoom=null;render()">← 戻る</button><span class="gallery-title">カード一覧</span><span></span></div>
    <div class="gallery-tabs">${tabHtml}</div>
    ${contentHtml}
  </div></div></div>`;
      }

      let body = '';
      if (lobbyState.mode === 'select') {
        body = `<div><label class="lobby-label">あなたの名前</label><input id="lobby-name" class="lobby-input" type="text" placeholder="例: 田中" maxlength="12" value="${nv}" oninput="lobbyState.nameInput=this.value"></div>
    ${err}
    <div class="lobby-mode-btns">
      <button class="lobby-btn host" onclick="handleHostClick()"><span style="font-size:1.5rem">🏠</span><strong>ルームを作成</strong><span style="font-size:.72rem;color:rgba(255,255,255,.6)">ホスト（先攻）</span></button>
      <button class="lobby-btn join" onclick="lobbyState.mode='join';lobbyState.error='';render()"><span style="font-size:1.5rem">🔗</span><strong>ルームに参加</strong><span style="font-size:.72rem;color:rgba(255,255,255,.6)">ゲスト（後攻）</span></button>
    </div>
    <button class="lobby-btn-gallery" onclick="lobbyState.mode='gallery';lobbyState.galleryTab=null;lobbyState.galleryZoom=null;render()">📖 カードを見る</button>`;
      } else {
        body = `<div><label class="lobby-label">あなたの名前</label><input id="lobby-name" class="lobby-input" type="text" placeholder="例: 鈴木" maxlength="12" value="${nv}" oninput="lobbyState.nameInput=this.value"></div>
    <div><label class="lobby-label">ルームコード（6文字）</label><input id="lobby-code" class="lobby-input code-input" type="text" placeholder="AB3K7X" maxlength="6" value="${jv}" oninput="lobbyState.joinCodeInput=this.value.toUpperCase();this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')handleJoinClick()"></div>
    ${err}
    <button class="lobby-btn-single" onclick="handleJoinClick()">参加する</button>
    <button class="lobby-btn-back" onclick="lobbyState.mode='select';lobbyState.error='';render()">← 戻る</button>`;
      }
      return `<div class="screen active"><div class="lobby-wrap"><div class="lobby-box">
    <div class="lobby-hero"><div style="font-size:2.2rem">🌊⚡🔥</div><h1 class="lobby-title">都市防災カードバトル</h1><p style="color:var(--t2);font-size:.8rem">オンライン版 — 1人1デバイス</p></div>
    ${body}
    <div style="text-align:center;color:var(--t3);font-size:.7rem;margin-top:4px">簡易版 v3 ／ 2人用 ／ 各2都市 ／ 15〜20分</div>
  </div></div></div>`;
    }

    // ─── 接続待ち ───
    function renderWaitingConnection() {
      if (myRole === 'p1') {
        return `<div class="screen active"><div class="lobby-wrap"><div class="lobby-box">
      <div style="text-align:center"><div style="font-size:2rem;margin-bottom:6px">🏠 ホスト待機中</div><p style="color:var(--t2);font-size:.88rem">相手にルームコードまたはQRコードを共有してください</p></div>
      <div class="room-code-display"><div class="room-code-label">ルームコード</div><div class="room-code-value">${roomId || '------'}</div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div id="qr-container" style="background:var(--bg2);padding:10px;border-radius:10px;border:1px solid var(--bg3);min-height:52px;display:flex;align-items:center;justify-content:center"></div>
        <div style="font-size:.7rem;color:var(--t3)">QRコードを読み取るか、上のコードを口頭で伝えてください</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(56,139,253,.08);border:1px solid rgba(56,139,253,.3);border-radius:8px;padding:10px 14px">
        <span class="pulse-dot" style="background:var(--blue);min-width:12px"></span>
        <span style="font-size:.85rem;color:var(--blue)">相手の接続を待っています...</span>
      </div>
      <div style="color:var(--t3);font-size:.75rem;text-align:center">${G.players[0].name} としてホスト中</div>
    </div></div></div>`;
      } else {
        return `<div class="screen active"><div class="lobby-wrap"><div class="lobby-box">
      <div style="text-align:center"><div style="font-size:2rem;margin-bottom:6px">🔗 参加完了</div><p style="color:var(--t2);font-size:.88rem">ホストがゲームを開始するまでお待ちください</p></div>
      <div class="room-code-display"><div class="room-code-label">接続中のルーム</div><div class="room-code-value">${roomId || '------'}</div></div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:10px 14px;margin-top:8px">
        <span class="pulse-dot" style="background:var(--green);min-width:12px"></span>
        <span style="font-size:.85rem;color:var(--green)">ホストの開始を待っています...</span>
      </div>
      <div style="color:var(--t3);font-size:.75rem;text-align:center">${G.players[1].name} として参加中</div>
    </div></div></div>`;
      }
    }

    // ─── 待機画面 ───
    function renderWaiting() {
      let msg = '';
      switch (G.screen) {
        case 'cityOrder': msg = `${G.players[G.cityOrderState?.playerIdx ?? 0].name} が戦闘順を選んでいます`; break;
        case 'gacha': msg = `${G.players[G.gachaCurrent?.playerIdx ?? 0].name} が都市を選んでいます`; break;
        case 'draft': msg = `${G.players[G.draftState?.playerIdx ?? 0].name} が手札を引いています`; break;
        case 'turnDraw': { const pi = G.turnDrawState?.pi ?? G.turnDrawState?.playerIdx ?? 0; msg = `${G.players[pi].name} がカードを引いています`; } break;
        case 'turnSummary': msg = `${G.players[G.activePlayer].name} がターンサマリーを確認しています`; break;
        case 'response': msg = `${G.players[G.pendingAttack?.defenderIdx ?? 0].name} が対応カードを選んでいます`; break;
        case 'discard': { const pi = G.discardNeeded?.pi ?? G.discardNeeded?.playerIdx ?? 0; msg = `${G.players[pi].name} が捨て札を選んでいます`; } break;
        default: msg = `${G.players[G.activePlayer].name} のターンです`;
      }
      const showBoard = ['main', 'response'].includes(G.screen) && G.players[0].cities.length > 0;
      if (showBoard) {
        const mi = myPlayerIdx, oi = mi === 0 ? 1 : 0;
        return `<div class="screen active">
      <div class="waiting-banner"><span class="pulse-dot" style="background:var(--blue);min-width:10px;height:10px"></span><span>⏳ ${msg}</span></div>
      ${renderZoneReadOnly(oi, 'opponent')}
      <div class="log-area">${G.log.slice(0, 4).map(l => `<div class="log-entry ${l.cls}">${l.msg}</div>`).join('') || '<div class="log-entry sys">待機中</div>'}</div>
      ${renderZoneReadOnly(mi, 'player')}
    </div>`;
      }
      return `<div class="screen active"><div class="wait-screen">
    <div class="wait-icon">⏳</div><div class="wait-title">${msg}</div>
    <div class="wait-sub">相手の操作をお待ちください</div>
  </div></div>`;
    }

    // ─── 対応待ち（守備側が攻撃宣言後に相手の選択を待つ） ───
    function renderWaitingResponse() {
      const atk = G.pendingAttack; if (!atk) return renderWaiting();
      const mi = myPlayerIdx, oi = mi === 0 ? 1 : 0;
      const defHasNegate = G.players[atk.defenderIdx].effects.negateSpecial;
      const isCompoundSkip = atk.card.specialType === 'skip_response' && !defHasNegate;
      const banner = isCompoundSkip
        ? `<div class="waiting-banner red">⚡ ${G.players[atk.attackerIdx].name}が「${atk.card.icon} ${atk.card.name}」を宣言！複合災害：あなたの対応フェーズはスキップされます...</div>`
        : `<div class="waiting-banner red">⚔️ ${G.players[atk.attackerIdx].name}が「${atk.card.icon} ${atk.card.name}」を宣言！対応フェーズの確認を待っています...</div>`;
      const notice = isCompoundSkip
        ? `<div class="response-pending-bar"><div class="rpb-icon">⚡</div><div class="rpb-text"><strong>複合災害の特殊効果：対応フェーズ強制スキップ</strong><br>政策カードは使用できません。攻撃の解決をお待ちください。</div></div>`
        : `<div class="response-pending-bar"><div class="rpb-icon">⚠️</div><div class="rpb-text"><strong>${G.players[atk.attackerIdx].name}が「${atk.card.icon} ${atk.card.name}」を使用！</strong><br>相手が「対応を確認」か「対応しない」を選んでいます...</div></div>`;
      return `<div class="screen active">
    ${banner}
    ${renderZoneReadOnly(oi, 'opponent')}
    ${notice}
    <div class="log-area">${G.log.slice(0, 4).map(l => `<div class="log-entry ${l.cls}">${l.msg}</div>`).join('')}</div>
    ${renderZoneReadOnly(mi, 'player')}
  </div>`;
    }

    // ─── 読み取り専用ゾーン ───
    function renderZoneReadOnly(idx, position) {
      const p = G.players[idx]; if (!p || !p.cities || p.cities.length === 0) return '';
      const c = getActiveCity(idx); const hp = getActiveCityHp(idx); const mxHp = getActiveMaxHp(idx);
      const isMe = (idx === myPlayerIdx);
      return `<div class="${position}-zone">
    <div class="zone-header"><span class="zone-label">${isMe ? 'あなた' : '相手'}</span><span class="city-icon-sm">${c ? c.icon : ''}</span><button class="city-tap-btn" onclick="showCityInfo(${idx})">${c ? c.name : '?'} ⓘ</button>${c ? `<span class="terrain-badge">(${c.isCoastal ? '海岸' : c.isMountain ? '山間部' : '内陸'})</span>` : ''}</div>
    <div class="hp-section"><div class="hp-bar-wrap"><div class="hp-bar-fill${hp <= 10 ? ' hp-warn' : ''}" style="width:${Math.max(0, hp / mxHp * 100)}%;background:${hpColor(hp, mxHp)}"></div></div><div class="hp-text" style="color:${hpColor(hp, mxHp)}">${Math.max(0, hp)}/${mxHp}</div>${hp <= 10 ? '<span class="hp-critical-badge">⚠️ 壊滅寸前</span>' : hp <= 30 ? '<span class="hp-danger-badge">危険</span>' : ''}</div>
    ${renderBackupCity(idx)}
    <div class="effects-row">${renderEffectBadges(p.effects)}</div>
    <div class="hand-cards-area">
      ${isMe ? renderPlayerHandReadOnly(p) : `<div class="hand-back-row">${Array(p.hand.length).fill('<div class="card-back"><img src="images/cards/back.webp" alt="" onerror="this.style.display=\'none\'"></div>').join('')}</div>`}
      <div class="hand-count">手札 ${p.hand.length} 枚</div>
    </div>
  </div>`;
    }

    // ─── ガチャ ───
    function renderGacha() {
      const gc = G.gachaCurrent; const p = G.players[gc.playerIdx];
      let firstPickInfo = '';
      if (gc.pickNum === 1 && p.cities.length > 0) { const fc = p.cities[0]; firstPickInfo = `<div class="gacha-first-pick">✅ 1枚目：${fc.icon} <strong>${fc.name}</strong>　${fc.abilityDesc}</div>`; }
      let ca = '';
      if (!gc.revealed) { ca = `<div class="gacha-card-reveal-area" onclick="pullGacha()"><img src="images/cities/back.webp" alt=""></div><button class="btn-gacha" onclick="pullGacha()">🎲 ガチャを引く！</button>`; }
      else { const c = gc.revealed; ca = `<div class="gacha-card-reveal-area revealed gacha-reveal"><img src="images/cities/${c.id}.webp" alt="" onerror="this.style.opacity='.3'"></div><button class="btn-accept" onclick="acceptGachaCity()">✅ この都市で進む</button>`; }
      return `<div class="screen active"><div class="section-title">🎲 ${p.name} — ${gc.pickNum === 0 ? '1枚目' : '2枚目'}の都市ガチャ</div>${firstPickInfo}<div class="gacha-stage">${ca}</div></div>`;
    }

    // ─── 予備都市 ───
    function renderBackupCity(pi) {
      const p = G.players[pi];
      if (p.activeCityIdx !== 0) return `<div style="font-size:.7rem;color:var(--t3);margin-bottom:4px">予備都市なし</div>`;
      if (p.cities.length < 2) return '';
      // 両者が1体目の都市で戦っている間は2体目を隠す
      const bothOnFirst = G.players[0].activeCityIdx === 0 && G.players[1].activeCityIdx === 0;
      if (bothOnFirst) return `<div class="backup-city-row"><span class="backup-label" style="color:var(--t3);font-style:italic">予備都市: 未登場</span></div>`;
      const bc = p.cities[1]; const bHp = p.cityHps[1]; const pct = Math.max(0, bHp / bc.hp * 100);
      return `<div class="backup-city-row"><span class="backup-label">予備: ${bc.icon} ${bc.name}</span><div class="hp-bar-mini"><div class="hp-bar-mini-fill" style="width:${pct}%;background:${hpColor(bHp, bc.hp)}"></div></div><span class="backup-hp-text" style="color:${hpColor(bHp, bc.hp)}">${bHp}/${bc.hp}</span></div>`;
    }

    // ─── 効果バッジ ───
    function renderEffectBadges(eff) {
      const b = [];
      if (eff.shieldQuakeFire) b.push(`<span class="eff-badge eff-blue">🏗️ 耐震シールド</span>`);
      if (eff.shieldFlood) b.push(`<span class="eff-badge eff-blue">🌊 堤防シールド</span>`);
      if (eff.negateSpecial) b.push(`<span class="eff-badge eff-blue">📢 特殊効果無効</span>`);
      if (eff.damageReduceHits > 0) b.push(`<span class="eff-badge eff-yellow">🏛️ 全ダメ−15（残${eff.damageReduceHits}回）</span>`);
      if (eff.floodBonusTurns > 0) b.push(`<span class="eff-badge eff-blue">💧 予算+1</span>`);
      return b.join('') || `<span class="eff-badge eff-gray">効果なし</span>`;
    }

    // ─── 手札描画（操作可能） ───
    function renderPlayerHand(p, pi) {
      const isFirstTurn = (pi === 0 && G.turnsEach[0] === 0); const left = getBudgetLeft(pi);
      function mkCard(card) {
        const cantAfford = left < card.cost; const ftBlk = isFirstTurn && card.type === 'disaster'; const dis = cantAfford || ftBlk;
        let reason = ''; if (cantAfford) reason = '予算不足'; else if (ftBlk) reason = '先攻1ターン目は使用不可';
        const oc = dis ? '' : `requestConfirm('playCard','${card.uid}','${card.name.replace(/'/g, "\\'")}','${card.icon}','${card.type}','使用')`;
        return `<div class="card ${card.type} ${dis ? 'card-disabled' : 'card-usable'}" onclick="${oc}" style="cursor:${dis ? 'not-allowed' : 'pointer'}"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost">${card.cost}</span></div><div class="card-img-wrap"><img class="card-img" src="images/cards/${card.id}.webp" alt="" onerror="this.closest('.card').classList.add('img-fail')"><div class="card-name-bar">${card.name}</div></div><div class="card-name card-text-fallback">${card.name}</div><div class="card-desc card-text-fallback">${card.desc}</div><span class="card-type-badge">${card.type === 'policy' ? '政策' : '災害'}</span>${reason ? `<div class="card-disabled-reason">${reason}</div>` : ''}</div>`;
      }
      const pols = p.hand.filter(c => c.type === 'policy').sort((a, b) => a.cost - b.cost);
      const dis = p.hand.filter(c => c.type === 'disaster').sort((a, b) => a.cost - b.cost);
      const s = [];
      if (pols.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label policy-label">政策</div><div class="hand-group-cards">${pols.map(mkCard).join('')}</div></div>`);
      if (dis.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label disaster-label">災害</div><div class="hand-group-cards">${dis.map(mkCard).join('')}</div></div>`);
      return `<div class="hand-groups">${s.join('')}</div>`;
    }

    // ─── 手札描画（読み取り専用：自分のターン外） ───
    function renderPlayerHandReadOnly(p) {
      function mkCard(card) { return `<div class="card ${card.type} card-disabled" style="cursor:default"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost">${card.cost}</span></div><div class="card-img-wrap"><img class="card-img" src="images/cards/${card.id}.webp" alt="" onerror="this.closest('.card').classList.add('img-fail')"><div class="card-name-bar">${card.name}</div></div><div class="card-name card-text-fallback">${card.name}</div><div class="card-desc card-text-fallback">${card.desc}</div><span class="card-type-badge">${card.type === 'policy' ? '政策' : '災害'}</span></div>`; }
      const pols = p.hand.filter(c => c.type === 'policy').sort((a, b) => a.cost - b.cost);
      const dis = p.hand.filter(c => c.type === 'disaster').sort((a, b) => a.cost - b.cost);
      const s = [];
      if (pols.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label policy-label">政策</div><div class="hand-group-cards">${pols.map(mkCard).join('')}</div></div>`);
      if (dis.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label disaster-label">災害</div><div class="hand-group-cards">${dis.map(mkCard).join('')}</div></div>`);
      return `<div class="hand-groups">${s.join('')}</div>`;
    }

    // ─── 手札描画（対応フェーズ） ───
    function renderResponseHand(p) {
      if (p.hand.length === 0) return `<div style="color:var(--t3);font-size:.85rem;padding:10px">手札なし</div>`;
      function mkCard(card) { const dis = card.type !== 'policy'; const oc = dis ? '' : `requestConfirm('playResponseCard','${card.uid}','${card.name.replace(/'/g, "\\'")}','${card.icon}','${card.type}','対応に使用')`; return `<div class="card ${card.type} ${dis ? 'card-disabled' : 'card-usable'}" onclick="${oc}" style="cursor:${dis ? 'not-allowed' : 'pointer'}"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost" style="font-size:.6rem">${dis ? card.cost + 'pt' : '無料'}</span></div><div class="card-img-wrap"><img class="card-img" src="images/cards/${card.id}.webp" alt="" onerror="this.closest('.card').classList.add('img-fail')"><div class="card-name-bar">${card.name}</div></div><div class="card-name card-text-fallback">${card.name}</div><div class="card-desc card-text-fallback">${card.desc}</div><span class="card-type-badge">${dis ? '災害（使用不可）' : '対応'}</span>${dis ? `<div class="card-disabled-reason">対応フェーズは政策カードのみ</div>` : ''}</div>`; }
      const pols = p.hand.filter(c => c.type === 'policy').sort((a, b) => a.cost - b.cost);
      const dis = p.hand.filter(c => c.type === 'disaster').sort((a, b) => a.cost - b.cost);
      const s = [];
      if (pols.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label policy-label">政策（対応可）</div><div class="hand-group-cards">${pols.map(mkCard).join('')}</div></div>`);
      if (dis.length > 0) s.push(`<div class="hand-group"><div class="hand-group-label disaster-label">災害（使用不可）</div><div class="hand-group-cards">${dis.map(mkCard).join('')}</div></div>`);
      return `<div class="hand-groups">${s.join('')}</div>`;
    }

    // ─── メインゲーム（自分が常に下ゾーン） ───
    function renderMain(isResponsePhase) {
      const mi = myPlayerIdx, oi = mi === 0 ? 1 : 0; const ap = G.activePlayer;
      const deviceHolder = isResponsePhase ? G.pendingAttack.defenderIdx : ap;
      const amIHolder = (deviceHolder === mi);
      const budget = getBudget(ap), left = getBudgetLeft(ap);
      const hasPending = !!G.pendingAttack; const isMyAttack = hasPending && G.pendingAttack.attackerIdx === mi;
      const stateBanner = !amIHolder ? `<div class="state-banner ${isResponsePhase ? 'state-banner-response' : 'state-banner-waiting'}">${isResponsePhase ? '⚠️ 相手が対応フェーズを処理中...' : `⏳ <strong>${G.players[ap].name}</strong> のターン進行中...`}</div>` : '';

      function zoneHand(idx) {
        const isMe = (idx === mi);
        if (!isMe) return Array(G.players[idx].hand.length).fill('<div class="card-back"><img src="images/cards/back.webp" alt="" onerror="this.style.display=\'none\'"></div>').join('');
        if (amIHolder) return isResponsePhase ? renderResponseHand(G.players[idx]) : renderPlayerHand(G.players[idx], idx);
        return renderPlayerHandReadOnly(G.players[idx]);
      }

      let pendingBar = '';
      if (hasPending) {
        if (isResponsePhase) {
          const _rpbAtk = G.pendingAttack;
          let _rpbEst = computeEstDmg(_rpbAtk.card, mi);
          const _rpbEff = G.players[mi].effects;
          if (_rpbEff.negateSpecial && _rpbAtk.card.specialType) _rpbEst -= 10;
          if (_rpbEff.shieldQuakeFire && (_rpbAtk.card.id === 'earthquake' || _rpbAtk.card.id === 'wildfire')) _rpbEst -= 30;
          if (_rpbEff.shieldFlood && (_rpbAtk.card.id === 'flood' || _rpbAtk.card.id === 'tsunami')) _rpbEst -= 25;
          if (_rpbEff.damageReduceHits > 0) _rpbEst -= 15;
          const _rpbHpAfter = Math.max(0, getActiveCityHp(mi) - Math.max(0, _rpbEst));
          const _dmgPreview = `<div class="response-dmg-preview"><span class="rdp-item rdp-skip">対応なし → HP <strong>${_rpbHpAfter}</strong></span></div>`;
          pendingBar = `<div class="response-pending-bar"><div class="rpb-icon">⚠️</div><div class="rpb-text"><strong>${G.players[_rpbAtk.attackerIdx].name}が「${_rpbAtk.card.icon} ${_rpbAtk.card.name}」を使用！</strong><br>政策カードを1枚選んで対応、または「対応しない」を押してください。${_dmgPreview}</div><button class="btn-skip-resp" onclick="skipResponse()">対応しない</button></div>`;
        } else if (isMyAttack) {
          const _atk = G.pendingAttack;
          const _defHasNegate = G.players[_atk.defenderIdx].effects.negateSpecial;
          if (_atk.card.specialType === 'skip_response' && !_defHasNegate) {
            pendingBar = `<div class="response-pending-bar"><div class="rpb-icon">⚡</div><div class="rpb-text"><strong>「${_atk.card.icon} ${_atk.card.name}」を宣言！</strong><br>複合災害の特殊効果：${G.players[_atk.defenderIdx].name}の対応フェーズを強制スキップします。</div><button class="btn-respond" onclick="goResponseHandover()">スキップして攻撃を確定</button></div>`;
          } else if (_atk.card.specialType === 'skip_response' && _defHasNegate) {
            pendingBar = `<div class="response-pending-bar"><div class="rpb-icon">⚡</div><div class="rpb-text"><strong>「${_atk.card.icon} ${_atk.card.name}」を宣言！</strong><br>相手の広域避難指示が有効のため、対応フェーズが発生します。</div><button class="btn-respond" onclick="goResponseHandover()">対応を確認（広域避難指示あり）</button></div>`;
          } else {
            pendingBar = `<div class="response-pending-bar"><div class="rpb-icon">⚔️</div><div class="rpb-text"><strong>「${_atk.card.icon} ${_atk.card.name}」を宣言！</strong><br>${G.players[_atk.defenderIdx].name}に対応を確認しますか？</div><button class="btn-respond" onclick="goResponseHandover()">対応を確認</button><button class="btn-skip-resp" onclick="skipResponse()">対応しない</button></div>`;
          }
        }
      }

      const logAll = G.log.slice(0, 30).map(l => `<div class="log-entry ${l.cls}">${l.msg}</div>`).join('');
      const toggleBtn = G.log.length > 3 ? `<button class="log-toggle" onclick="_logExpanded=!_logExpanded;render()">${_logExpanded ? '▲ 閉じる' : `▼ ${Math.min(G.log.length, 30)}件すべて表示`}</button>` : '';
      let statusBar = '';
      if (ap === mi && !hasPending && !isResponsePhase) {
        statusBar = `<div class="status-bar"><span class="turn-badge">ターン ${G.turnsEach[ap] + 1} | ${G.players[ap].name}</span>
      <div class="budget-display"><span class="budget-label">予算</span><div class="budget-pips">${Array(budget).fill(0).map((_, i) => `<div class="pip ${i < (budget - left) ? 'used' : 'avail'}"></div>`).join('')}</div><span style="font-size:.8rem;font-weight:700;color:var(--green)">${left}<span style="color:var(--t3);font-weight:400">/${budget}</span></span></div>
      </div>`;
      }

      const isFirstTurn = (ap === mi && G.turnsEach[0] === 0);
      // 自動ターン終了判定
      function canPlayAnyCard() {
        if (hasPending || isResponsePhase) return true;
        const p = G.players[ap]; if (ap !== mi) return true;
        const bl = getBudgetLeft(ap);
        return p.hand.some(c => {
          if (c.cost > bl) return false;
          if (isFirstTurn && c.type === 'disaster') return false;
          return true;
        });
      }
      const shouldAutoEnd = (ap === mi && !hasPending && !isResponsePhase && !canPlayAnyCard());

      function renderZone(idx, position, footer = '') {
        const p = G.players[idx]; const c = getActiveCity(idx); const hp = getActiveCityHp(idx); const mxHp = getActiveMaxHp(idx);
        const isHolder = (idx === deviceHolder); const isMe = (idx === mi);
        const label = isMe ? (isResponsePhase ? 'あなた（対応中）' : 'あなた') : (isHolder ? '相手（操作中）' : '相手（待機中）');
        const bdr = isHolder && isMe ? 'border-left:3px solid var(--green)' : isHolder && !isMe ? 'border-left:3px solid var(--red)' : '';
        const terrainLabel = c ? `<span class="terrain-badge">(${c.isCoastal ? '海岸' : c.isMountain ? '山間部' : '内陸'})</span>` : '';
        return `<div class="${position}-zone" style="${bdr}">
      <div class="zone-header"><span class="zone-label">${label}</span><span class="city-icon-sm">${c ? c.icon : ''}</span><button class="city-tap-btn" onclick="showCityInfo(${idx})">${c ? c.name : '?'} ⓘ</button>${terrainLabel}</div>
      <div class="hp-section"><div class="hp-bar-wrap"><div class="hp-bar-fill${hp <= 10 ? ' hp-warn' : ''}" id="hp-fill-${idx}" style="width:${Math.max(0, hp / mxHp * 100)}%;background:${hpColor(hp, mxHp)}"></div></div><div class="hp-text" id="hp-text-${idx}" style="color:${hpColor(hp, mxHp)}">${Math.max(0, hp)}/${mxHp}</div>${hp <= 10 ? '<span class="hp-critical-badge">⚠️ 壊滅寸前</span>' : hp <= 30 ? '<span class="hp-danger-badge">危険</span>' : ''}</div>
      ${renderBackupCity(idx)}
      <div class="effects-row">${renderEffectBadges(p.effects)}</div>
      <div class="hand-cards-area">${isMe ? zoneHand(idx) : `<div class="hand-back-row">${zoneHand(idx)}</div>`}${!isMe ? `<div class="hand-count">手札 ${p.hand.length} 枚</div>` : ''}</div>
    ${footer}</div>`;
      }

      // レイアウト: 相手ゾーン → ログ → ステータスバー → pendingBar/ターン終了 → 自分ゾーン
      let actionBar = '';
      if (shouldAutoEnd) {
        actionBar = `<div class="auto-end-bar"><div class="auto-end-text">⚙️ 使えるカードがありません。ターンを終了します…</div></div>`;
        if (!G._autoEndScheduled) { G._autoEndScheduled = true; setTimeout(() => { G._autoEndScheduled = false; endTurn(); }, 2500); }
      } else if (hasPending) {
        actionBar = pendingBar;
      } else if (ap === mi && !isResponsePhase) {
        actionBar = `<div class="action-bar"><button class="btn-end" onclick="requestEndTurn()">ターン終了 →</button></div>`;
      }

      return `<div class="screen active"><div class="battle-layout">
    ${stateBanner}
    ${renderZone(oi, 'opponent')}
    <div class="log-area${_logExpanded ? '' : ' log-collapsed'}" id="log-area">${logAll || '<div class="log-entry sys">ゲーム開始</div>'}${toggleBtn}</div>
    ${statusBar}
    ${renderZone(mi, 'player', actionBar)}
  </div></div>`;
    }

    // ─── 確認モーダル ───
    function renderConfirmModal() {
      const c = G.confirm;
      if (c.fn === 'endTurn') {
        const left = getBudgetLeft(G.activePlayer);
        return `<div class="confirm-overlay" onclick="cancelConfirm()"><div class="confirm-box" onclick="event.stopPropagation()">
          <div style="font-size:2.5rem;text-align:center;margin-bottom:4px">💰</div>
          <div class="confirm-card-preview"><strong>予算 ${left}pt が残っています</strong></div>
          <p>本当にターンを終了しますか？</p>
          <div class="confirm-btns"><button class="btn-ok" onclick="doConfirm()">終了する</button><button class="btn-cancel" onclick="cancelConfirm()">キャンセル</button></div>
        </div></div>`;
      }
      const tl = c.cardType === 'policy' ? '政策カード' : c.cardType === 'disaster' ? '災害カード' : 'カード';
      let hint = '';
      if (c.cardType === 'disaster' && c.fn === 'playCard') {
        const defIdx = G.activePlayer === 0 ? 1 : 0; const defCity = getActiveCity(defIdx); const card = G.players[G.activePlayer].hand.find(cd => cd.uid === c.uid);
        if (card && defCity && card.baseDamage) {
          const base = card.baseDamage; let bonus = 0; let bl = '';
          if (card.specialType === 'coastal_bonus' && defCity.isCoastal) { bonus = 10; bl = `${defCity.name}（海岸）`; }
          else if (card.specialType === 'mountain_bonus' && defCity.isMountain) { bonus = 10; bl = `${defCity.name}（山間部）`; }
          else if (card.specialType === 'inland_bonus' && !defCity.isCoastal && !defCity.isMountain) { bonus = 10; bl = `${defCity.name}（内陸）`; }
          if (bonus > 0) hint = `<div style="margin:4px 0;padding:6px 10px;background:rgba(248,81,73,.12);border-radius:6px;font-size:.8rem;text-align:center">基礎 <strong>${base}</strong> + <strong style="color:var(--red)">+${bonus}</strong> = <strong style="color:var(--red)">${base + bonus}</strong> ダメージ<br><span style="color:var(--t3);font-size:.7rem">${bl}に有効</span></div>`;
          else hint = `<div style="margin:4px 0;padding:5px 10px;background:rgba(139,148,158,.1);border-radius:6px;font-size:.8rem;color:var(--t2);text-align:center">基礎ダメージ <strong style="color:var(--t1)">${base}</strong></div>`;
        }
      }
      if (c.cardType === 'policy') {
        const pi = (c.fn === 'playResponseCard') ? G.pendingAttack.defenderIdx : G.activePlayer; const card = G.players[pi].hand.find(cd => cd.uid === c.uid);
        if (card) {
          const p = G.players[pi]; const curHp = p.cityHps[p.activeCityIdx]; const mxHp = getActiveMaxHp(pi); let h = '';
          if (card.effectType === 'heal') { const aH = Math.min(curHp + card.value, mxHp); h = `HP +${card.value} 回復　<strong style="color:var(--green)">${curHp} → ${aH}</strong>`; }
          else if (card.effectType === 'shield_quake_fire') { if (G.pendingAttack && (G.pendingAttack.card.id === 'earthquake' || G.pendingAttack.card.id === 'wildfire')) { const e = computeEstDmg(G.pendingAttack.card, pi); h = `この攻撃に適用：−30 → 予測 <strong style="color:var(--green)">${Math.max(0, e - 30)}</strong>`; } else h = '次の地震・大火災を −30（シールド設置）'; }
          else if (card.effectType === 'shield_flood') { if (G.pendingAttack && (G.pendingAttack.card.id === 'flood' || G.pendingAttack.card.id === 'tsunami')) { const e = computeEstDmg(G.pendingAttack.card, pi); h = `この攻撃に適用：−25 → 予測 <strong style="color:var(--green)">${Math.max(0, e - 25)}</strong>`; } else h = '次の洪水・津波を −25（シールド設置）'; }
          else if (card.effectType === 'negate_special') h = G.pendingAttack ? '特殊効果を無効化＋ダメージ−10' : '次の災害の特殊効果を無効化＋ダメージ−10';
          else if (card.effectType === 'damage_reduce_2t') { if (G.pendingAttack) { const e = computeEstDmg(G.pendingAttack.card, pi); h = `全ダメージ −15（次2回）→ 予測 <strong style="color:var(--green)">${Math.max(0, e - 15)}</strong>`; } else h = '全ダメージ −15（次2回の攻撃）'; }
          else if (card.effectType === 'draw') h = `山札から ${card.value} 枚ドロー`;
          else if (card.effectType === 'peek_all') h = '相手の手札を全公開';
          if (h) hint = `<div style="margin:4px 0;padding:6px 10px;background:rgba(56,139,253,.12);border-radius:6px;font-size:.8rem;color:var(--t2);text-align:center">${h}</div>`;
        }
      }
      const cardId = c.uid.replace(/_\d+$/, '');
      return `<div class="confirm-overlay" onclick="cancelConfirm()"><div class="confirm-box" onclick="event.stopPropagation()">
    <img class="confirm-card-img" src="images/cards/${cardId}.webp" alt="" onerror="this.style.display='none'">
    <div class="confirm-card-preview"><span>${c.name}</span></div>
    ${hint}<p>${tl}を<strong style="color:${c.danger ? 'var(--red)' : 'var(--blue)'}">${c.actionLabel}</strong>しますか？</p>
    <div class="confirm-btns"><button class="btn-ok${c.danger ? ' danger' : ''}" onclick="doConfirm()">はい</button><button class="btn-cancel" onclick="cancelConfirm()">キャンセル</button></div>
  </div></div>`;
    }

    // ─── 捨て札選択 ───
    function renderDiscard() {
      const dn = G.discardNeeded; const pi = dn.pi ?? dn.playerIdx; const p = G.players[pi]; const excess = p.hand.length - 5;
      const cards = p.hand.map(card => `<div class="card ${card.type}" onclick="requestConfirm('discardCard','${card.uid}','${card.name.replace(/'/g, "\\'")}','${card.icon}','${card.type}','捨て札にする',true)" style="cursor:pointer"><div class="card-header"><span class="card-icon">${card.icon}</span><span class="card-cost">${card.cost}</span></div><div class="card-img-wrap"><img class="card-img" src="images/cards/${card.id}.webp" alt="" onerror="this.closest('.card').classList.add('img-fail')"><div class="card-name-bar">${card.name}</div></div><div class="card-name card-text-fallback">${card.name}</div><div class="card-desc card-text-fallback">${card.desc}</div><span class="card-type-badge">${card.type === 'policy' ? '政策' : '災害'}</span></div>`).join('');
      return `<div class="screen active"><div class="section-title">📤 ${p.name} — 捨てるカードを選んでください</div>
    <div class="discard-info">手札が上限（5枚）を超えています。<strong style="color:var(--red)">${excess}枚</strong>を捨ててください。<br><span style="font-size:.75rem;color:var(--t3)">カードをクリックすると捨て札になります</span></div>
    <div style="font-size:.8rem;color:var(--t2);text-align:center">現在の手札：<strong style="color:var(--yellow)">${p.hand.length}枚</strong>　→　目標：5枚</div>
    <div class="discard-cards">${cards}</div></div>`;
    }

    // ─── ターン開始ドロー ───
    function renderTurnDraw() {
      const ts = G.turnDrawState; const pi = ts.pi ?? ts.playerIdx; const p = G.players[pi];
      const pips = Array(ts.target).fill(0).map((_, i) => { const cls = i < ts.drawn ? 'done' : i === ts.drawn ? 'current' : ''; return `<div class="draft-pip ${cls}"></div>`; }).join('');
      let ca = '';
      if (!ts.revealed) { ca = `<div class="gacha-card-reveal-area" onclick="pullTurnCard()"><img src="images/cards/back.webp" alt=""></div><button class="btn-gacha" onclick="pullTurnCard()">🃏 カードを引く！</button>`; }
      else { const c = ts.revealed; ca = `<div class="gacha-card-reveal-area revealed gacha-reveal"><img src="images/cards/${c.id}.webp" alt="" onerror="this.style.opacity='.3'"></div><button class="btn-accept" onclick="acceptTurnCard()">✅ 手札に加える</button>`; }
      return `<div class="screen active"><div class="section-title">${ts.isHazardMap ? `🗺️ ${p.name} — ハザードマップ整備（${ts.drawn + 1}枚目／${ts.target}枚）` : `🃏 ${p.name} — ターン開始ドロー（${ts.drawn + 1}枚目／${ts.target}枚）`}</div>
    <div class="draft-progress"><div><span style="font-size:.8rem;color:var(--t2)">ドロー </span><strong style="color:var(--yellow)">${ts.drawn} / ${ts.target}</strong><span style="font-size:.8rem;color:var(--t2)"> 枚</span></div><div class="draft-pips">${pips}</div></div>
    <div class="gacha-stage">${ca}</div></div>`;
    }

    // ─── 初期ドラフト ───
    function renderDraft() {
      const ds = G.draftState; const p = G.players[ds.playerIdx];
      const pips = Array(ds.picksTarget).fill(0).map((_, i) => { const cls = i < ds.picksDone ? 'done' : i === ds.picksDone ? 'current' : ''; return `<div class="draft-pip ${cls}"></div>`; }).join('');
      const hp = p.hand.length > 0 ? p.hand.map(c => `<span class="draft-hand-tag">${c.icon} ${c.name}</span>`).join('') : `<span style="font-size:.75rem;color:var(--t3)">まだ引いていません</span>`;
      let ca = '';
      if (!ds.revealed) { ca = `<div class="gacha-card-reveal-area" onclick="pullDraftCard()"><img src="images/cards/back.webp" alt=""></div><button class="btn-gacha" onclick="pullDraftCard()">🃏 山札から引く！</button>`; }
      else { const c = ds.revealed; ca = `<div class="gacha-card-reveal-area revealed gacha-reveal"><img src="images/cards/${c.id}.webp" alt="" onerror="this.style.opacity='.3'"></div><button class="btn-accept" onclick="acceptDraftCard()">✅ 手札に加える</button>`; }
      return `<div class="screen active"><div class="section-title">🃏 ${p.name} — 初期手札を引いてください</div>
    <div class="draft-progress"><div><span style="font-size:.8rem;color:var(--t2)">手札 </span><strong style="color:var(--yellow)">${ds.picksDone} / ${ds.picksTarget}</strong><span style="font-size:.8rem;color:var(--t2)"> 枚</span></div><div class="draft-pips">${pips}</div></div>
    <div class="draft-hand-preview"><div style="font-size:.7rem;color:var(--t3);margin-bottom:5px">現在の手札</div><div style="display:flex;gap:6px;flex-wrap:wrap">${hp}</div></div>
    <div class="gacha-stage">${ca}</div></div>`;
    }

    // ─── 防災協定（全公開） ───
    function renderPeek() {
      const cards = G.peekCards || (G.peekCard ? [G.peekCard] : []);
      const cardsHtml = cards.map(c => {
        const tc = c.type === 'policy' ? 'var(--blue)' : 'var(--red)';
        return `<div class="peek-card-big" style="display:inline-flex;margin:6px">
          <img src="images/cards/${c.id}.webp" style="width:72px;border-radius:6px" alt="" onerror="this.style.display='none'">
          <div class="pk-icon">${c.icon}</div><div class="pk-name">${c.name}</div>
          <div class="pk-cost" style="color:${tc}">コスト: ${c.cost}</div>
          <div class="pk-desc">${c.desc}</div></div>`;
      }).join('');
      return `<div class="screen active"><div style="text-align:center;padding:12px;color:var(--t2);font-size:.85rem">🔒 相手の手札（${cards.length}枚）</div>
    <div class="peek-card-display" style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px">${cardsHtml}</div>
    <div style="text-align:center;margin-top:16px"><button class="btn-ho" onclick="closePeek()" style="font-size:.9rem">確認した（閉じる）</button></div></div>`;
    }

    // ─── ターンサマリー ───
    function renderTurnSummary() {
      const events = G._turnSummary || []; const p = G.players[G.activePlayer];
      const _catLabel = { exposure: '地形リスク', city_policy: '都市対策', city_effect: '都市能力', shield_pre: 'シールド', shield_resp: '対応シールド', agency: '防災庁', negate: '特殊無効', vuln: '脆弱性', special: '特殊効果' };
      const _catClass = { exposure: 'exposure', city_policy: 'policy', city_effect: 'policy', shield_pre: 'shield', shield_resp: 'shield', agency: 'agency', negate: 'negate', vuln: 'vuln', special: 'negate' };
      function renderDetail(d) {
        if (typeof d !== 'object' || !d.cat) return `<div class="ts-ev-subline">${d}</div>`;
        const cl = _catLabel[d.cat] || d.cat; const cc = _catClass[d.cat] || 'policy';
        const dH = d.delta != null ? `<span class="ts-bd-delta ${d.delta > 0 ? 'pos' : 'neg'}">${d.delta > 0 ? '+' : ''}${d.delta}</span>` : '';
        const rH = d.running != null ? `<span class="ts-bd-run">→ ${d.running}</span>` : '';
        return `<div class="ts-ev-breakdown"><span class="ts-cat ts-cat-${cc}">${cl}</span><span class="ts-bd-text">${d.text}</span>${dH}${rH}</div>`;
      }
      const items = events.map(ev => {
        if (ev.type === 'damage') {
          const dl = (ev.details && ev.details.length) ? ev.details.map(renderDetail).join('') : '';
          if (ev.damage === 0) { return `<div class="ts-ev heal"><div class="ts-ev-title">🛡️ ${ev.cardIcon} ${ev.cardName} — 完全防御！</div>${dl}<div class="ts-ev-detail">基礎ダメージ ${ev.baseDamage || '?'} → 最終ダメージ 0（HP ${ev.hpBefore} のまま）</div></div>`; }
          let hl = ''; if (ev.healAmount > 0) hl = `<div class="ts-ev-subline" style="color:var(--green)">💚 「${ev.healCardName}」で +${ev.healAmount} 回復（HP ${ev.hpAfterDamage} → ${ev.hpAfter}）</div>`;
          return `<div class="ts-ev damage"><div class="ts-ev-title">💥 ${ev.cardIcon} ${ev.cardName} — ${ev.damage} ダメージ</div><div class="ts-ev-subline" style="color:var(--t2)">基礎ダメージ：${ev.baseDamage || '?'}</div>${dl}<div class="ts-ev-detail">最終ダメージ ${ev.damage}（HP ${ev.hpBefore} → ${ev.hpAfterDamage}）</div>${hl}</div>`;
        }
        if (ev.type === 'disaster_agency_remaining') { if (ev.remaining === 0) return `<div class="ts-ev warn"><div class="ts-ev-title">🏛️ 防災庁設置の効果が終了しました</div><div class="ts-ev-detail">次の攻撃からは全ダメージ −15 の軽減はありません</div></div>`; return `<div class="ts-ev warn"><div class="ts-ev-title">🏛️ 防災庁設置：残り ${ev.remaining} 回</div><div class="ts-ev-detail">あと ${ev.remaining} 回の被攻撃まで全ダメージ −15</div></div>`; }
        if (ev.type === 'response_skipped') return `<div class="ts-ev warn" style="border-color:var(--red)"><div class="ts-ev-title">⚡ 複合災害：対応フェーズがスキップされました</div><div class="ts-ev-detail">${ev.cityName ? `「${ev.cityName}」` : 'あなた'}は政策カードを使用できませんでした</div></div>`;
        if (ev.type === 'opp_regen') return `<div class="ts-ev heal"><div class="ts-ev-title">💚 ${ev.cityIcon} ${ev.cityName}：HP +${ev.amount} 回復</div><div class="ts-ev-detail">HP ${ev.hpBefore} → ${ev.hpAfter}</div></div>`;
        if (ev.type === 'flood_budget') return `<div class="ts-ev budget"><div class="ts-ev-title">💧 ${ev.cityIcon} ${ev.cityName}：今ターン予算 +1</div><div class="ts-ev-detail">洪水・津波後の復旧ボーナス（このターン有効）</div></div>`;
        if (ev.type === 'typhoon_discard') return `<div class="ts-ev typhoon" style="border-color:var(--yellow);border-width:2px;background:rgba(227,179,65,.1)"><div class="ts-ev-title" style="font-size:1.1rem">🌀 台風の特殊効果！</div><div style="margin:6px 0;padding:7px 10px;background:rgba(248,81,73,.1);border-radius:6px;border:1px solid rgba(248,81,73,.3);text-align:center;color:var(--red);font-weight:700;font-size:.88rem">⚠️ あなたの手札からカードが奪われました！</div><div class="ts-ev-detail" style="font-size:1rem;text-align:center"><span style="font-size:2rem">${ev.cardIcon}</span><br>「<strong>${ev.cardName}</strong>」が手札から失われました</div></div>`;
        return '';
      }).join('');
      return `<div class="screen active"><div class="turn-summary-box">
    <div class="ts-title">📋 ${p.name}のターン — 前ターンの状況確認</div>
    <div class="ts-events">${items || '<div style="color:var(--t3);font-size:.85rem">特記なし</div>'}</div>
    <div style="text-align:center;margin-top:12px"><button class="btn-ho" onclick="dismissTurnSummary()">✅ 確認してターン開始</button></div>
  </div></div>`;
    }

    // ─── ゲームオーバー ───
    function renderGameOver() {
      const w = G.players[G.winner]; const li = G.winner === 0 ? 1 : 0; const l = G.players[li];
      const wc = w.cities.map((c, i) => `${c.icon}${c.name}(${Math.max(0, w.cityHps[i])}HP)`).join('・');
      const lc = l.cities.map((c, i) => `${c.icon}${c.name}(${Math.max(0, l.cityHps[i])}HP)`).join('・');
      return `<div class="screen active"><div class="gameover-box">
    <div class="go-icon">🏆</div><h2>${w.name} の勝利！</h2><p>${l.name}の都市がすべて壊滅しました。</p>
    <div style="margin:12px 0;padding:12px;background:var(--bg2);border-radius:10px;max-width:440px;font-size:.8rem;color:var(--t2);line-height:2">🏙️ ${w.name}：${wc}<br>💥 ${l.name}：${lc}</div>
    <button class="btn-replay" onclick="restartGame()">もう一度遊ぶ</button>
  </div></div>`;
    }

    // ─── 都市情報モーダル ───
    function showCityInfo(idx) { _cityInfoModal = idx; render(); }
    function hideCityInfo() { _cityInfoModal = null; render(); }

    function renderCityInfoModal() {
      const idx = _cityInfoModal;
      if (idx === null || !G.players[idx]) { _cityInfoModal = null; return ''; }
      const p = G.players[idx]; const c = getActiveCity(idx);
      if (!c) { _cityInfoModal = null; return ''; }
      const hp = getActiveCityHp(idx); const mxHp = getActiveMaxHp(idx);
      const terrain = c.isCoastal ? '海岸都市' : c.isMountain ? '山間部都市' : '内陸都市';
      return `<div class="city-info-overlay" onclick="hideCityInfo()">
        <div class="city-info-box" onclick="event.stopPropagation()">
          <img src="images/cities/${c.id}.webp" style="width:120px;border-radius:10px;display:block;margin:0 auto 6px" alt="" onerror="this.style.display='none'">
          <div style="font-size:1.4rem;text-align:center">${c.icon}</div>
          <div style="font-size:1.1rem;font-weight:700;text-align:center;margin:3px 0">${c.name}</div>
          <div style="font-size:.73rem;color:var(--t2);text-align:center">${terrain} ／ HP <strong style="color:${hpColor(hp, mxHp)}">${hp}</strong>/${mxHp}</div>
          <div style="background:rgba(56,139,253,.1);border:1px solid rgba(56,139,253,.3);border-radius:8px;padding:9px 12px;font-size:.82rem;margin-top:4px">
            <div style="font-weight:700;color:var(--blue);margin-bottom:3px">都市能力</div>
            <div>${c.abilityDesc}</div>
          </div>
          <div style="font-size:.72rem;color:var(--t2);line-height:1.55">${c.concept}</div>
          <div style="text-align:center;margin-top:8px"><button style="padding:7px 24px;background:var(--bg3);border:none;border-radius:8px;color:var(--t2);cursor:pointer;font-size:.85rem" onclick="hideCityInfo()">閉じる</button></div>
        </div>
      </div>`;
    }

    // ─── ターン終了確認 ───
    function requestEndTurn() {
      const left = getBudgetLeft(G.activePlayer);
      if (left > 0) {
        G.confirm = { fn: 'endTurn', uid: '', name: '', icon: '', cardType: 'sys', actionLabel: 'ターン終了', danger: false };
        render();
      } else {
        endTurn();
      }
    }

    // ═══════════════════════════════════════
    // EVENT HANDLERS
    // ═══════════════════════════════════════
    function handleHostClick() { const name = lobbyState.nameInput.trim(); if (!name) { lobbyState.error = '名前を入力してください'; render(); return; } lobbyState.error = ''; createRoom(); }
    function handleJoinClick() { const name = lobbyState.nameInput.trim(); const code = lobbyState.joinCodeInput.trim(); if (!name) { lobbyState.error = '名前を入力してください'; render(); return; } if (code.length !== 6) { lobbyState.error = 'ルームコードは6文字で入力してください'; render(); return; } lobbyState.error = ''; joinRoom(); }
    function dismissTurnSummary() { G._turnSummary = null; setupTurnDraw(G.activePlayer); pushState(); render(); }
    function requestConfirm(fn, uid, name, icon, cardType, actionLabel, danger = false) { G.confirm = { fn, uid, name, icon, cardType, actionLabel, danger }; render(); }
    function doConfirm() { const c = G.confirm; G.confirm = null; if (c.fn === 'playCard') playCard(c.uid); else if (c.fn === 'playResponseCard') playResponseCard(c.uid); else if (c.fn === 'discardCard') discardCard(c.uid); else if (c.fn === 'endTurn') endTurn(); }
    function cancelConfirm() { G.confirm = null; render(); }

    function playCard(uid) {
      const p = G.players[G.activePlayer]; const idx = p.hand.findIndex(c => c.uid === uid); if (idx === -1) return; const card = p.hand[idx];
      if (G.activePlayer === 0 && G.turnsEach[0] === 0 && card.type === 'disaster') { alert('先攻1ターン目は災害カードを使えません。'); return; }
      if (getBudgetLeft(G.activePlayer) < card.cost) return;
      p.hand.splice(idx, 1); G.discard.push(card); p.budgetUsed += card.cost;
      showBudgetToast(card.cost, getBudgetLeft(G.activePlayer), getBudget(G.activePlayer));
      if (card.type === 'policy') {
        applyPolicyEffect(card, G.activePlayer, false);
        if (G.screen === 'peek') { pushState(); render(); return; }
        if (G.screen === 'turnDraw') { pushState(); render(); return; }
        if (!handleDiscardIfNeeded(G.activePlayer, 'main')) goMain();
      } else {
        const defIdx = G.activePlayer === 0 ? 1 : 0; G.pendingAttack = { card, attackerIdx: G.activePlayer, defenderIdx: defIdx };
        addLog(`⚔️ ${p.name}が「${card.icon} ${card.name}」を宣言！`, 'sys'); pushState(); render();
      }
    }

    function goResponseHandover() {
      const atk = G.pendingAttack;
      const def = G.players[atk.defenderIdx];
      if (atk.card.specialType === 'skip_response' && !def.effects.negateSpecial) {
        addLog(`⚡ 複合災害：${def.name}の対応フェーズを強制スキップ！`, 'sys');
        G._nextTurnEvents[atk.defenderIdx].push({ type: 'response_skipped', cityName: getActiveCity(atk.defenderIdx)?.name || '' });
        resolveDamage(atk.card, atk.defenderIdx, null);
        G.pendingAttack = null;
        if (checkWin()) return;
        G.screen = 'main'; pushState(); render();
        return;
      }
      G.screen = 'response'; pushState(); render();
    }

    function skipResponse() {
      resolveDamage(G.pendingAttack.card, G.pendingAttack.defenderIdx, null); G.pendingAttack = null;
      if (checkWin()) return; G.screen = 'main'; pushState(); render();
    }

    function playResponseCard(uid) {
      const defIdx = G.pendingAttack.defenderIdx; const def = G.players[defIdx];
      const idx = def.hand.findIndex(c => c.uid === uid); if (idx === -1) return; const card = def.hand[idx]; if (card.type !== 'policy') return;
      def.hand.splice(idx, 1); G.discard.push(card); addLog(`🛡️ ${def.name}が「${card.icon} ${card.name}」で対応！`, 'policy');
      resolveDamage(G.pendingAttack.card, defIdx, card); G.pendingAttack = null;
      if (checkWin()) return; if (G.screen !== 'peek') G.screen = 'main'; pushState(); render();
    }

    function discardCard(uid) {
      const dn = G.discardNeeded; const pi = dn.pi ?? dn.playerIdx; const p = G.players[pi];
      const idx = p.hand.findIndex(c => c.uid === uid); if (idx === -1) return;
      const card = p.hand.splice(idx, 1)[0]; G.discard.push(card); addLog(`📤 ${p.name}がカードを1枚捨てた`, 'sys');
      if (p.hand.length <= 5) { G.discardNeeded = null; G.screen = dn.returnTo; }
      pushState(); render();
    }

    function closePeek() { G.peekCard = null; G.peekCards = null; G.peekByPlayerIdx = null; G.screen = 'main'; pushState(); render(); }

    function restartGame() {
      if (db && roomId && myRole === 'p1') db.ref(`rooms/${roomId}`).remove();
      myRole = null; myPlayerIdx = 0; roomId = null; myLastPush = null;
      lobbyState = { mode: 'select', nameInput: '', joinCodeInput: '', error: '', galleryTab: null, galleryZoom: null };
      G = { screen: 'lobby', activePlayer: 0, turnsEach: [0, 0], players: [{ name: 'プレイヤー1', cities: [], cityHps: [], activeCityIdx: 0, hand: [], budgetUsed: 0, effects: mkEffects() }, { name: 'プレイヤー2', cities: [], cityHps: [], activeCityIdx: 0, hand: [], budgetUsed: 0, effects: mkEffects() }], deck: [], discard: [], log: [], pendingAttack: null, peekCard: null, winner: null, gachaPickedIds: [], gachaCurrent: null, draftState: null, discardNeeded: null, confirm: null, turnDrawState: null, cityOrderState: null, _nextTurnEvents: { 0: [], 1: [] }, _turnSummary: null };
      render();
    }

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam) { lobbyState.joinCodeInput = roomParam.toUpperCase().slice(0, 6); lobbyState.mode = 'join'; }
      if (isFirebaseConfigured()) initFirebase();
      render();
    });
  </script>
</body>

</html>
